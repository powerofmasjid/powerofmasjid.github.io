<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Power of Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F7F7F5;color:#1A1A1A;}
:root{--primary:#1B6B3A;--primary-dark:#0F4228;--primary-light:#E8F5EE;--accent:#C9A84C;--white:#FFFFFF;--bg:#F7F7F5;--text:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--danger:#DC2626;}

/* SPLASH & LOGIN */
.splash{position:fixed;inset:0;background:var(--primary-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Amiri',serif;font-size:48px;color:var(--accent);margin-bottom:0.5rem;}
.splash-text{color:rgba(255,255,255,0.7);font-size:13px;}

.login-wrap{display:none;position:fixed;inset:0;background:var(--primary-dark);align-items:center;justify-content:center;z-index:9998;padding:1.5rem;}
.login-wrap.show{display:flex;}
.login-card{background:white;border-radius:20px;padding:2rem;text-align:center;width:100%;max-width:360px;}
.login-logo{font-family:'Amiri',serif;font-size:40px;color:var(--primary);margin-bottom:0.5rem;}
.login-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem;}
.btn-submit{width:100%;background:var(--primary);color:white;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:0.5rem;}

/* HEADER */
.admin-header{background:linear-gradient(160deg,var(--primary-dark),var(--primary));padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.admin-header-left{display:flex;align-items:center;gap:10px;}
.admin-logo{font-family:'Amiri',serif;font-size:24px;color:var(--accent);}
.admin-title{color:white;font-size:14px;font-weight:600;}
.admin-sub{color:rgba(255,255,255,0.6);font-size:11px;margin-top:1px;}
.btn-logout{background:rgba(255,255,255,0.15);border:none;color:white;font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;}

/* TABS */
.nav-tabs{background:white;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 1rem;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:0.875rem 1rem;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);}

/* MAIN */
.admin-main{padding:1rem;max-width:600px;margin:0 auto;}
.section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}

/* DASHBOARD CARD */
.dash-card{background:var(--primary-light);border-radius:15px;padding:1rem;margin-bottom:1.5rem;border:1px solid rgba(27,107,58,0.1);}
.dash-val{font-size:24px;font-weight:700;color:var(--primary);margin-top:4px;}

/* FORM */
.form-group{margin-bottom:1rem;}
.form-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
.form-input, .form-select, .form-textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:white;color:var(--text);outline:none;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-up{background:var(--accent);color:white;border:none;padding:0 12px;border-radius:10px;font-weight:700;cursor:pointer;font-size:11px;height:45px;}

/* LIST ITEM */
.item-card{background:white;border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:8px;position:relative;}
.item-card-title{font-size:14px;font-weight:600;}
.btn-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;font-size:13px;padding:12px 25px;border-radius:50px;transition:0.3s;z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-logo">م</div>
  <div class="splash-text">Memuat Dashboard...</div>
</div>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">م</div>
    <div class="login-title">Admin Login</div>
    <div class="login-sub">Masukkan Email & PIN 6 Digit.</div>
    <div class="form-group" style="text-align:left;"><label class="form-label">Email</label><input type="email" class="form-input" id="login-gmail" placeholder="nama@gmail.com"></div>
    <div class="form-group" style="text-align:left;"><label class="form-label">PIN</label><input type="password" class="form-input" id="login-pin" maxlength="6" style="text-align:center;letter-spacing:8px;font-size:20px;"></div>
    <button class="btn-submit" onclick="prosesLogin()" id="btn-login">Masuk ke Panel</button>
  </div>
</div>

<div id="admin-content" style="display:none">
  <div class="admin-header">
    <div class="admin-header-left">
      <div class="admin-logo">م</div>
      <div>
        <div class="admin-title" id="admin-masjid-nama">Panel Admin</div>
        <div id="admin-nama-role" style="font-size:11px;color:rgba(255,255,255,0.7);">Memuat...</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Keluar</button>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="gotoTab('transaksi')">💰 Kas</div>
    <div class="nav-tab" onclick="gotoTab('jadwal')">📅 Jadwal</div>
    <div class="nav-tab" onclick="gotoTab('pengumuman')">📢 Program</div>
    <div class="nav-tab" onclick="gotoTab('galeri')">📸 Galeri</div>
    <div class="nav-tab" onclick="gotoTab('profil')">⚙️ Profil</div>
  </div>

  <div class="admin-main">
    <div id="tab-transaksi">
      <div class="dash-card">
        <div class="form-label">Total Saldo Kas</div>
        <div class="dash-val" id="val-saldo">Rp 0</div>
      </div>
      <div class="section-title">Input Transaksi & Bukti Nota</div>
      <div class="form-group"><label class="form-label">Tanggal</label><input type="date" class="form-input" id="trx-tanggal"></div>
      <div class="form-group"><label class="form-label">Jenis</label><select class="form-select" id="trx-jenis" onchange="toggleBuktiUI()"><option value="masuk">Penerimaan (+)</option><option value="keluar">Pengeluaran (-)</option></select></div>
      <div class="form-group"><label class="form-label">Keterangan</label><input type="text" class="form-input" id="trx-keterangan" placeholder="Infaq Jumat / Bayar Listrik"></div>
      <div class="form-group"><label class="form-label">Nominal (Rp)</label><input type="number" class="form-input" id="trx-jumlah"></div>
      <div id="box-upload-bukti" style="display:none" class="form-group">
        <label class="form-label">Foto Bukti/Nota</label>
        <div style="display:flex;gap:8px;">
          <input type="text" class="form-input" id="trx-bukti-url" readonly style="background:#eee;">
          <button class="btn-up" id="btn-up-bukti" onclick="document.getElementById('file-bukti').click()">Upload</button>
          <input type="file" id="file-bukti" style="display:none" onchange="uploadKeImgBB(this, 'trx-bukti-url', 'btn-up-bukti')">
        </div>
      </div>
      <button class="btn-submit" onclick="simpanTransaksi()">💾 Simpan Transaksi</button>
      <div class="section-title" style="margin-top:2rem;">5 Transaksi Terakhir</div>
      <div id="list-trx-admin"></div>
    </div>

    <div id="tab-jadwal" style="display:none">
      <div class="section-title">Jadwal Kegiatan</div>
      <div class="form-group"><label class="form-label">Nama Kegiatan</label><input type="text" class="form-input" id="jdw-nama"></div>
      <div class="form-group"><label class="form-label">Waktu & Hari (Bebas Ketik)</label><input type="text" class="form-input" id="jdw-jadwal" placeholder="Contoh: Ba'da Subuh - Setiap Ahad"></div>
      <button class="btn-submit" onclick="simpanJadwal()">💾 Simpan Jadwal</button>
    </div>

    <div id="tab-pengumuman" style="display:none">
      <div class="section-title">Program & Kurban</div>
      <div class="form-group"><label class="form-label">Tipe</label>
        <select class="form-select" id="peng-tipe" onchange="toggleTipeUI()">
          <option value="UMUM">📢 Umum</option>
          <option value="KURBAN">🐄 Kurban</option>
          <option value="RAMADAN">🌙 Ramadan</option>
          <option value="PEMBANGUNAN">🏗️ Pembangunan</option>
          <option value="LAPORAN">📊 Laporan</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Judul</label><input type="text" class="form-input" id="peng-judul"></div>
      <div class="form-group"><label class="form-label">Isi Detail</label><textarea class="form-textarea" id="peng-isi"></textarea></div>
      <div class="form-group"><label class="form-label">Ikon (Emoji)</label><input type="text" class="form-input" id="peng-ikon" value="📢"></div>
      <div id="box-kurban" style="display:none;background:var(--primary-light);padding:1rem;border-radius:10px;margin-bottom:1rem;">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Total Slot Sapi</label><input type="number" class="form-input" id="peng-target-slot" value="0"></div>
          <div class="form-group"><label class="form-label">Slot Terisi</label><input type="number" class="form-input" id="peng-terisi-slot" value="0"></div>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Target Dana (Rp)</label><input type="number" class="form-input" id="peng-target" value="0"></div>
      <button class="btn-submit" onclick="simpanPengumuman()">💾 Tayangkan Program</button>
    </div>

    <div id="tab-galeri" style="display:none">
      <div class="section-title">Media Galeri</div>
      <div class="form-group"><label class="form-label">Tipe</label><select class="form-select" id="gal-tipe" onchange="toggleGaleriUI()"><option value="FOTO">📷 Foto</option><option value="VIDEO_YOUTUBE">▶️ YouTube</option></select></div>
      <div class="form-group"><label class="form-label">Judul Media</label><input type="text" class="form-input" id="gal-judul"></div>
      <div class="form-group"><label class="form-label">Link/File</label>
        <div style="display:flex;gap:8px;"><input type="text" class="form-input" id="gal-url" style="margin:0;"><button class="btn-up" id="btn-up-gal" onclick="document.getElementById('file-gal').click()">Pilih Foto</button><input type="file" id="file-gal" style="display:none" onchange="uploadKeImgBB(this, 'gal-url', 'btn-up-gal')"></div>
      </div>
      <button class="btn-submit" onclick="simpanGaleri()">💾 Simpan Galeri</button>
    </div>

    <div id="tab-profil" style="display:none">
      <div class="profil-section">
        <h3>📍 Data Masjid</h3>
        <div class="form-group"><label class="form-label">Nama Masjid</label><input type="text" class="form-input" id="prof-nama"></div>
        <div class="form-group"><label class="form-label">Alamat</label><input type="text" class="form-input" id="prof-alamat"></div>
        <div class="form-group"><label class="form-label">WA DKM</label><input type="text" class="form-input" id="prof-wa"></div>
      </div>
      <div class="profil-section">
        <h3>💳 Rekening Bank</h3>
        <div class="form-row"><div class="form-group"><label class="form-label">Bank 1</label><input type="text" class="form-input" id="prof-rek1-bank"></div><div class="form-group"><label class="form-label">No Rek 1</label><input type="text" class="form-input" id="prof-rek1-nomor"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Bank 2</label><input type="text" class="form-input" id="prof-rek2-bank"></div><div class="form-group"><label class="form-label">No Rek 2</label><input type="text" class="form-input" id="prof-rek2-nomor"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Bank 3</label><input type="text" class="form-input" id="prof-rek3-bank"></div><div class="form-group"><label class="form-label">No Rek 3</label><input type="text" class="form-input" id="prof-rek3-nomor"></div></div>
      </div>
      <button class="btn-submit" onclick="simpanProfil()">💾 Update Profil</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY_IMGBB = '13e22ae09205fa7788ec0cd06e94cfaa';
const API_URL = 'https://script.google.com/macros/s/AKfycbyqxGZb7NzDFPRHTXnpfLo6yqc3LOVwb6DsFOOoZZLXCfLI-iYH0g9CeeSm9puhXcJHXg/exec';

let ADMIN_DATA = null;
let ID_MASJID = '';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}

function toggleBuktiUI() {
  const j = document.getElementById('trx-jenis').value;
  document.getElementById('box-upload-bukti').style.display = (j === 'keluar') ? 'block' : 'none';
}

function toggleTipeUI() {
  const t = document.getElementById('peng-tipe').value;
  const ikon = document.getElementById('peng-ikon');
  document.getElementById('box-kurban').style.display = (t === 'KURBAN') ? 'block' : 'none';
  if(t==='KURBAN') ikon.value = '🐄'; else if(t==='RAMADAN') ikon.value = '🌙'; else if(t==='PEMBANGUNAN') ikon.value = '🏗️'; else ikon.value = '📢';
}

function toggleGaleriUI() {
  const t = document.getElementById('gal-tipe').value;
  document.getElementById('btn-up-gal').style.display = (t==='VIDEO_YOUTUBE') ? 'none' : 'block';
}

function uploadKeImgBB(fileInput, targetId, btnId) {
  const file = fileInput.files[0]; if(!file) return;
  const btn = document.getElementById(btnId); btn.textContent = '⏳...';
  const formData = new FormData(); formData.append('image', file);
  fetch('https://api.imgbb.com/1/upload?key='+API_KEY_IMGBB, {method:'POST', body:formData})
  .then(r=>r.json()).then(j=>{
    btn.textContent = 'Ganti';
    if(j.success){ document.getElementById(targetId).value = j.data.url; showToast('Foto Berhasil!'); }
  });
}

function gotoTab(t) {
  ['transaksi','jadwal','pengumuman','galeri','profil'].forEach(id => {
    document.getElementById('tab-'+id).style.display = id===t ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase().includes(t)));
  if(t==='transaksi') loadKas();
  if(t==='profil') loadProfilAdmin();
}

function prosesLogin() {
  const g = document.getElementById('login-gmail').value;
  const p = document.getElementById('login-pin').value;
  fetch(API_URL+'?action=cekAdmin&gmail='+encodeURIComponent(g)+'&pin='+encodeURIComponent(p))
  .then(r=>r.json()).then(j=>{
    if(j.status==='ok'){
      ADMIN_DATA = j.data; ID_MASJID = ADMIN_DATA.id_masjid;
      localStorage.setItem('pow_admin', JSON.stringify(ADMIN_DATA));
      renderDashboard();
    } else showToast(j.message);
  });
}

function renderDashboard() {
  document.getElementById('login-wrap').classList.remove('show');
  document.getElementById('admin-content').style.display = 'block';
  document.getElementById('admin-nama-role').textContent = ADMIN_DATA.nama + ' (Admin)';
  loadKas();
}

function loadKas() {
  fetch(API_URL+'?action=getSaldo&id_masjid='+ID_MASJID).then(r=>r.json()).then(j=>{
    if(j.status==='ok') document.getElementById('val-saldo').textContent = 'Rp ' + j.data.saldo.toLocaleString('id-ID');
  });
  fetch(API_URL+'?action=getTransaksi&id_masjid='+ID_MASJID).then(r=>r.json()).then(j=>{
    const el = document.getElementById('list-trx-admin');
    if(j.status==='ok') el.innerHTML = j.data.slice(0,5).map(t => `
      <div class="item-card">
        <div class="item-card-title">${t.keterangan}</div>
        <div style="font-size:12px; color:${t.jenis==='masuk'?'green':'red'}">${t.jenis==='masuk'?'+':'-'} Rp ${t.jumlah.toLocaleString('id-ID')}</div>
        <button class="btn-del" onclick="hapusTrx('${t.id}')">🗑️</button>
      </div>
    `).join('');
  });
}

function hapusTrx(id) {
  if(confirm('Hapus transaksi ini?')) {
    fetch(API_URL, {method:'POST', body:JSON.stringify({action:'deleteTransaksi', id:id})})
    .then(() => { showToast('Terhapus!'); loadKas(); });
  }
}

function simpanTransaksi() {
  const data = {
    action: 'addTransaksi', id_masjid: ID_MASJID,
    tanggal: document.getElementById('trx-tanggal').value,
    keterangan: document.getElementById('trx-keterangan').value,
    jenis: document.getElementById('trx-jenis').value,
    jumlah: document.getElementById('trx-jumlah').value,
    bukti_url: document.getElementById('trx-bukti-url').value,
    dicatat_oleh: ADMIN_DATA.nama
  };
  fetch(API_URL, {method:'POST', body:JSON.stringify(data)}).then(() => { showToast('Tersimpan!'); loadKas(); });
}

function simpanJadwal() {
  const data = { action: 'addJadwal', id_masjid: ID_MASJID, nama_kegiatan: document.getElementById('jdw-nama').value, jadwal: document.getElementById('jdw-jadwal').value };
  fetch(API_URL, {method:'POST', body:JSON.stringify(data)}).then(() => showToast('Jadwal Tersimpan!'));
}

function simpanPengumuman() {
  const data = { action: 'addPengumuman', id_masjid: ID_MASJID, tipe: document.getElementById('peng-tipe').value, judul: document.getElementById('peng-judul').value, isi: document.getElementById('peng-isi').value, ikon: document.getElementById('peng-ikon').value, target_slot: document.getElementById('peng-target-slot').value, terisi_slot: document.getElementById('peng-terisi-slot').value, target_dana: document.getElementById('peng-target').value };
  fetch(API_URL, {method:'POST', body:JSON.stringify(data)}).then(() => showToast('Tayang!'));
}

function loadProfilAdmin() {
  fetch(API_URL+'?action=getMasjid&id_masjid='+ID_MASJID).then(r=>r.json()).then(j=>{
    if(j.status==='ok'){
      const d = j.data;
      document.getElementById('prof-nama').value = d.nama||''; document.getElementById('prof-alamat').value = d.alamat||''; document.getElementById('prof-wa').value = d.telepon_wa||'';
      document.getElementById('prof-rek1-bank').value = d.rek1_bank||''; document.getElementById('prof-rek1-nomor').value = d.rek1_nomor||'';
      document.getElementById('prof-rek2-bank').value = d.rek2_bank||''; document.getElementById('prof-rek2-nomor').value = d.rek2_nomor||'';
      document.getElementById('prof-rek3-bank').value = d.rek3_bank||''; document.getElementById('prof-rek3-nomor').value = d.rek3_nomor||'';
      document.getElementById('admin-masjid-nama').textContent = d.nama;
    }
  });
}

function simpanProfil() {
  const data = { action:'updateMasjid', id_masjid:ID_MASJID, nama:document.getElementById('prof-nama').value, alamat:document.getElementById('prof-alamat').value, telepon_wa:document.getElementById('prof-wa').value, rek1_bank:document.getElementById('prof-rek1-bank').value, rek1_nomor:document.getElementById('prof-rek1-nomor').value, rek2_bank:document.getElementById('prof-rek2-bank').value, rek2_nomor:document.getElementById('prof-rek2-nomor').value, rek3_bank:document.getElementById('prof-rek3-bank').value, rek3_nomor:document.getElementById('prof-rek3-nomor').value };
  fetch(API_URL, {method:'POST', body:JSON.stringify(data)}).then(() => showToast('Profil Terupdate!'));
}

function logout() { localStorage.removeItem('pow_admin'); location.reload(); }

window.onload = () => {
  const s = localStorage.getItem('pow_admin');
  if(s){ 
    try { ADMIN_DATA = JSON.parse(s); ID_MASJID = ADMIN_DATA.id_masjid; renderDashboard(); } catch(e) { localStorage.removeItem('pow_admin'); location.reload(); }
  } else document.getElementById('login-wrap').classList.add('show');
  document.getElementById('splash').classList.add('hide');
};
</script>
</body>
</html>
