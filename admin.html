<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Power of Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F7F7F5;color:#1A1A1A;}
:root{--primary:#1B6B3A;--primary-dark:#0F4228;--primary-light:#E8F5EE;--accent:#C9A84C;--white:#FFFFFF;--bg:#F7F7F5;--text:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--danger:#DC2626;}

/* SPLASH */
.splash{position:fixed;inset:0;background:var(--primary-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Amiri',serif;font-size:48px;color:var(--accent);margin-bottom:0.5rem;}
.splash-text{color:rgba(255,255,255,0.7);font-size:13px;}

/* LOGIN */
.login-wrap{display:none;position:fixed;inset:0;background:var(--primary-dark);align-items:center;justify-content:center;z-index:9998;padding:1.5rem;}
.login-wrap.show{display:flex;}
.login-card{background:white;border-radius:20px;padding:2rem;text-align:center;width:100%;max-width:360px;}
.login-logo{font-family:'Amiri',serif;font-size:40px;color:var(--primary);margin-bottom:0.5rem;}
.login-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem;line-height:1.5;}
.btn-submit{width:100%;background:var(--primary);color:white;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:0.5rem;}
.btn-submit:active{opacity:0.8;}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}

/* HEADER ADMIN */
.admin-header{background:linear-gradient(160deg,var(--primary-dark),var(--primary));padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.admin-header-left{display:flex;align-items:center;gap:10px;}
.admin-logo{font-family:'Amiri',serif;font-size:24px;color:var(--accent);}
.admin-title{color:white;font-size:14px;font-weight:600;}
.admin-sub{color:rgba(255,255,255,0.6);font-size:11px;margin-top:1px;}
.btn-logout{background:rgba(255,255,255,0.15);border:none;color:white;font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:inherit;}

/* NAV TABS */
.nav-tabs{background:white;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 1rem;}
.nav-tab{flex-shrink:0;padding:0.875rem 1rem;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);}

/* MAIN */
.admin-main{padding:1.5rem 1rem;max-width:600px;margin:0 auto;}

/* FORM */
.form-group{margin-bottom:1.2rem;}
.form-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.5px;}
.form-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:white;color:var(--text);outline:none;transition:0.3s;}
.form-input:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light);}
.form-select{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:white;color:var(--text);outline:none;}
.form-textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:white;color:var(--text);outline:none;resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* BUTTON UPLOAD */
.btn-up { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size:12px; height: 45px; transition:0.3s; }
.btn-up:hover { background: #b08d3a; }

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;font-size:13px;padding:12px 25px;border-radius:50px;transition:transform 0.3s;z-index:9999;white-space:nowrap;box-shadow:0 10px 20px rgba(0,0,0,0.2);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.sukses{background:var(--primary);}
.toast.error{background:#DC2626;}

/* ITEM CARDS */
.item-card{background:white;border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.02);}
.item-card-title{font-size:14px;font-weight:600;color:var(--text);}
.item-card-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.item-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.item-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;}
.badge-aktif{background:var(--primary-light);color:var(--primary);}
.kosong{text-align:center;padding:3rem;color:var(--muted);font-size:13px;background:white;border-radius:15px;border:1px dashed var(--border);}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-logo">م</div>
  <div class="splash-text">Menyiapkan Dashboard...</div>
</div>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">م</div>
    <div class="login-title">Admin Login</div>
    <div class="login-sub">Masukkan Email Pengurus & PIN 6 Digit Keamanan.</div>
    <div class="form-group" style="text-align:left;">
      <label class="form-label">Email Gmail</label>
      <input type="email" class="form-input" id="login-gmail" placeholder="contoh@gmail.com">
    </div>
    <div class="form-group" style="text-align:left;">
      <label class="form-label">PIN Keamanan</label>
      <input type="password" class="form-input" id="login-pin" placeholder="••••••" maxlength="6" style="text-align:center; letter-spacing:8px; font-size:20px;">
    </div>
    <button class="btn-submit" onclick="prosesLogin()" id="btn-login">Masuk Sekarang</button>
  </div>
</div>

<div id="admin-content" style="display:none">
  <div class="admin-header">
    <div class="admin-header-left">
      <div class="admin-logo">م</div>
      <div>
        <div class="admin-title" id="admin-masjid-nama">Panel Admin</div>
        <div id="admin-nama-role" style="font-size:11px; color:rgba(255,255,255,0.7);">Memuat...</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Keluar</button>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="gotoTab('transaksi')">💰 Kas</div>
    <div class="nav-tab" onclick="gotoTab('jadwal')">📅 Jadwal</div>
    <div class="nav-tab" onclick="gotoTab('pengumuman')">📢 Pengumuman</div>
    <div class="nav-tab" onclick="gotoTab('galeri')">📸 Galeri</div>
    <div class="nav-tab" onclick="gotoTab('profil')">⚙️ Profil</div>
  </div>

  <div class="admin-main">
    <div id="tab-transaksi">
      <div class="form-group"><label class="form-label">Tanggal</label><input type="date" class="form-input" id="trx-tanggal"></div>
      <div class="form-group">
        <label class="form-label">Jenis Transaksi</label>
        <select class="form-select" id="trx-jenis">
          <option value="masuk">Penerimaan (+)</option>
          <option value="keluar">Pengeluaran (-)</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Keterangan</label><input type="text" class="form-input" id="trx-keterangan" placeholder="Infaq Jumat, Listrik, dll"></div>
      <div class="form-group"><label class="form-label">Nominal (Rp)</label><input type="number" class="form-input" id="trx-jumlah" placeholder="0"></div>
      <button class="btn-submit" onclick="simpanTransaksi()">💾 Simpan Transaksi</button>
      <div id="list-trx-admin" style="margin-top:2rem"></div>
    </div>

    <div id="tab-jadwal" style="display:none">
      <div class="form-group"><label class="form-label">Nama Kegiatan</label><input type="text" class="form-input" id="jdw-nama" placeholder="Kajian, TPA, dll"></div>
      <div class="form-group"><label class="form-label">Waktu / Jam</label><input type="text" class="form-input" id="jdw-jadwal" placeholder="18:30 WIB"></div>
      <div class="form-group"><label class="form-label">Hari</label><input type="text" class="form-input" id="jdw-hari" placeholder="Setiap Senin"></div>
      <button class="btn-submit" onclick="simpanJadwal()">💾 Simpan Jadwal</button>
      <div id="list-jadwal-admin" style="margin-top:2rem"></div>
    </div>

    <div id="tab-pengumuman" style="display:none">
      <div class="form-group"><label class="form-label">Tipe Pengumuman</label><select class="form-select" id="peng-tipe"><option value="UMUM">📢 Umum</option><option value="KURBAN">🐄 Kurban</option><option value="RAMADAN">🌙 Ramadan</option></select></div>
      <div class="form-group"><label class="form-label">Judul</label><input type="text" class="form-input" id="peng-judul"></div>
      <div class="form-group"><label class="form-label">Isi Detail</label><textarea class="form-textarea" id="peng-isi"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tgl Mulai</label><input type="date" class="form-input" id="peng-mulai"></div>
        <div class="form-group"><label class="form-label">Tgl Selesai</label><input type="date" class="form-input" id="peng-selesai"></div>
      </div>
      <button class="btn-submit" onclick="simpanPengumuman()">💾 Tayangkan</button>
      <div id="list-peng-admin" style="margin-top:2rem"></div>
    </div>

    <div id="tab-galeri" style="display:none">
      <div class="form-group"><label class="form-label">Judul Foto / Kegiatan</label><input type="text" class="form-input" id="gal-judul"></div>
      <div class="form-group">
        <label class="form-label">Pilih Foto (Otomatis Upload)</label>
        <div style="display:flex; gap:8px;">
          <input type="text" class="form-input" id="gal-url" placeholder="https://..." readonly style="background:#eee;">
          <button class="btn-up" id="btn-up-gal" onclick="document.getElementById('file-gal').click()">Pilih Foto</button>
          <input type="file" id="file-gal" accept="image/*" style="display:none" onchange="uploadKeImgBB(this, 'gal-url', 'btn-up-gal')">
        </div>
      </div>
      <button class="btn-submit" onclick="simpanGaleri()">💾 Unggah ke Galeri</button>
      <div id="list-gal-admin" style="margin-top:2rem"></div>
    </div>

    <div id="tab-profil" style="display:none">
      <div class="form-group"><label class="form-label">Nama Masjid</label><input type="text" class="form-input" id="prof-nama"></div>
      <div class="form-group"><label class="form-label">Alamat Lengkap</label><input type="text" class="form-input" id="prof-alamat"></div>
      <div class="form-group">
        <label class="form-label">Logo Masjid</label>
        <div style="display:flex; gap:8px;">
          <input type="text" class="form-input" id="prof-logo" placeholder="https://..." readonly style="background:#eee;">
          <button class="btn-up" id="btn-up-logo" onclick="document.getElementById('file-logo').click()">Ganti</button>
          <input type="file" id="file-logo" accept="image/*" style="display:none" onchange="uploadKeImgBB(this, 'prof-logo', 'btn-up-logo')">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">QRIS Masjid</label>
        <div style="display:flex; gap:8px;">
          <input type="text" class="form-input" id="prof-qris" placeholder="https://..." readonly style="background:#eee;">
          <button class="btn-up" id="btn-up-qris" onclick="document.getElementById('file-qris').click()">Ganti</button>
          <input type="file" id="file-qris" accept="image/*" style="display:none" onchange="uploadKeImgBB(this, 'prof-qris', 'btn-up-qris')">
        </div>
      </div>
      <button class="btn-submit" onclick="simpanProfil()">💾 Simpan Perubahan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================
// KONFIGURASI (SUDAH SIAP PAKAI)
// ============================================
const API_KEY_IMGBB = '13e22ae09205fa7788ec0cd06e94cfaa';
const API_URL = 'https://script.google.com/macros/s/AKfycbyqxGZb7NzDFPRHTXnpfLo6yqc3LOVwb6DsFOOoZZLXCfLI-iYH0g9CeeSm9puhXcJHXg/exec';

let ADMIN_DATA = null;
let ID_MASJID = '';
let SLUG_MASJID = '';

// ============================================
// CORE FUNCTIONS
// ============================================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function uploadKeImgBB(fileInput, targetInputId, btnId) {
  const file = fileInput.files[0];
  if (!file) return;
  const btn = document.getElementById(btnId);
  const textLama = btn.textContent;
  btn.textContent = '⏳...'; btn.disabled = true;

  const formData = new FormData();
  formData.append('image', file);

  fetch('https://api.imgbb.com/1/upload?key=' + API_KEY_IMGBB, { method: 'POST', body: formData })
    .then(r => r.json())
    .then(json => {
      btn.textContent = textLama; btn.disabled = false;
      if (json.success) {
        document.getElementById(targetInputId).value = json.data.url;
        showToast('Berhasil upload!', 'sukses');
      } else { showToast('Upload Gagal', 'error'); }
    }).catch(() => { btn.textContent = textLama; btn.disabled = false; });
}

function gotoTab(tab) {
  ['transaksi','jadwal','pengumuman','galeri','profil'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if(el) el.style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase().includes(tab));
  });
}

function prosesLogin() {
  const gmail = document.getElementById('login-gmail').value.trim().toLowerCase();
  const pin = document.getElementById('login-pin').value.trim();
  if (!gmail || !pin) { showToast('Lengkapi Email & PIN', 'error'); return; }
  
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Memverifikasi...';

  fetch(API_URL + '?action=cekAdmin&gmail=' + encodeURIComponent(gmail) + '&pin=' + encodeURIComponent(pin))
    .then(r => r.json())
    .then(json => {
      btn.disabled = false; btn.textContent = 'Masuk Sekarang';
      if (json.status === 'ok') {
        ADMIN_DATA = json.data;
        ID_MASJID = ADMIN_DATA.id_masjid;
        SLUG_MASJID = ADMIN_DATA.slug;
        localStorage.setItem('pow_admin', JSON.stringify(ADMIN_DATA));
        tampilkanDashboard();
      } else { showToast(json.message, 'error'); }
    }).catch(() => { btn.disabled = false; showToast('Koneksi Gagal', 'error'); });
}

function tampilkanDashboard() {
  document.getElementById('login-wrap').classList.remove('show');
  document.getElementById('admin-content').style.display = 'block';
  document.getElementById('admin-nama-role').textContent = ADMIN_DATA.nama + ' (' + ADMIN_DATA.role + ')';
  loadProfilAdmin();
}

function apiPost(data, msg) {
  fetch(API_URL, { method: 'POST', body: JSON.stringify(data) })
    .then(() => { 
      showToast(msg, 'sukses'); 
      if (SLUG_MASJID) localStorage.removeItem('masjid_' + SLUG_MASJID);
    });
}

function simpanTransaksi() {
  const tgl = document.getElementById('trx-tanggal').value;
  const ket = document.getElementById('trx-keterangan').value;
  const jml = document.getElementById('trx-jumlah').value;
  if(!tgl || !ket || !jml) { showToast('Lengkapi data', 'error'); return; }
  
  apiPost({
    action: 'addTransaksi', id_masjid: ID_MASJID,
    tanggal: tgl, keterangan: ket,
    jenis: document.getElementById('trx-jenis').value,
    jumlah: jml, dicatat_oleh: ADMIN_DATA.nama
  }, 'Transaksi Berhasil Dicatat');
}

function loadProfilAdmin() {
  fetch(API_URL + '?action=getMasjid&id_masjid=' + ID_MASJID)
    .then(r => r.json()).then(json => {
      if (json.status === 'ok') {
        const d = json.data;
        document.getElementById('prof-nama').value = d.nama || '';
        document.getElementById('prof-alamat').value = d.alamat || '';
        document.getElementById('prof-logo').value = d.logo_url || '';
        document.getElementById('prof-qris').value = d.qris_url || '';
        document.getElementById('admin-masjid-nama').textContent = d.nama;
      }
    });
}

function logout() { localStorage.removeItem('pow_admin'); location.reload(); }

window.onload = () => {
  const saved = localStorage.getItem('pow_admin');
  if (saved) {
    ADMIN_DATA = JSON.parse(saved);
    ID_MASJID = ADMIN_DATA.id_masjid;
    SLUG_MASJID = ADMIN_DATA.slug;
    tampilkanDashboard();
  } else { document.getElementById('login-wrap').classList.add('show'); }
  document.getElementById('splash').classList.add('hide');
};
</script>
</body>
</html>
