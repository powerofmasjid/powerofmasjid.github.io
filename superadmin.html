<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superadmin - Power of Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
  body { background: #F3F4F6; color: #1F2937; padding: 2rem; }
  .header { background: #0F4228; color: white; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; text-align: center; box-shadow: 0 10px 25px rgba(15,66,40,0.2); }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 5px; color: #C9A84C; }
  .header p { font-size: 14px; opacity: 0.8; }
  
  .kuota-box { display: inline-block; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 12px; margin-top: 15px; font-weight: 600; font-size: 16px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
  
  .card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #E5E7EB; position: relative; overflow: hidden; }
  .card-aktif { border-left: 6px solid #10B981; background: #ECFDF5; }
  .card-pasif { border-left: 6px solid #EF4444; background: #FEF2F2; }
  .card-belajar { border-left: 6px solid #F59E0B; background: #FFFBEB; }
  
  .card h3 { font-size: 18px; margin-bottom: 5px; color: #111827; }
  .card p { font-size: 13px; color: #4B5563; margin-bottom: 10px; }
  
  .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
  .badge-aktif { background: #10B981; color: white; }
  .badge-pasif { background: #EF4444; color: white; }
  .badge-belajar { background: #F59E0B; color: white; }
  
  .check-list { background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
  .check-list div { margin-bottom: 4px; }
  
  .btn-warning { width: 100%; background: #EF4444; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .btn-warning:hover { background: #DC2626; }
</style>
</head>
<body>

<div class="header">
  <h1>Panel Superadmin CEO</h1>
  <p>Manajemen & Filter Masjid Terdaftar</p>
  <div class="kuota-box">Kuota Server: <span id="kuota-text">Menghitung...</span> dari 10 Masjid</div>
</div>

<div id="loading" style="text-align:center; font-weight:bold; color:#6B7280;">⏳ Menganalisis aktivitas masjid, mohon tunggu...</div>
<div class="grid" id="masjid-list"></div>

<script>
// PASTIKAN API URL SAMA DENGAN SISTEM
const API_URL = 'https://script.google.com/macros/s/AKfycbzJhB3_-IqLJPSQOSNReTK5YAL7T1FdPGuMJjVIKf6MyO6v5NlFvpHEqM-yFWPs1hRe8A/exec';

// Trik ekstrak umur pendaftaran dari ID Masjid tanpa mengubah kode.gs
function extractDateFromId(idMasjid) {
   try {
      let parts = idMasjid.split('-');
      if(parts.length >= 2) {
         let timestampHex = parts[1];
         let timestamp = parseInt(timestampHex, 36);
         if(!isNaN(timestamp) && timestamp > 1700000000000) {
             return timestamp;
         }
      }
   } catch(e) {}
   return Date.now() - (15 * 24 * 60 * 60 * 1000); 
}

async function loadSuperadmin() {
  try {
    const res = await fetch(API_URL + '?action=getSuperadminData').then(r=>r.json());
    if(res.status === 'ok') {
      const list = res.data.list_masjid;
      let html = '';
      let masjidAktifTotal = 0;

      for(let m of list) {
        const [trx, jdw, gal] = await Promise.all([
           fetch(API_URL + '?action=getTransaksi&id_masjid=' + m.id).then(r=>r.json()),
           fetch(API_URL + '?action=getJadwal&id_masjid=' + m.id).then(r=>r.json()),
           fetch(API_URL + '?action=getGaleri&id_masjid=' + m.id).then(r=>r.json())
        ]);
        
        const isKas = trx.data && trx.data.length > 0;
        const isJdw = jdw.data && jdw.data.length > 0;
        const isGal = gal.data && gal.data.length > 0;

        // SYARAT AKTIF: Minimal sudah isi salah satu (kas/jdw/gal)
        const isMasjidAktif = isKas || isJdw || isGal; 
        if (isMasjidAktif) masjidAktifTotal++;

        const createdAt = extractDateFromId(m.id);
        const ageInDays = (Date.now() - createdAt) / (1000 * 60 * 60 * 24);

        let cardClass = '';
        let badge = '';
        let showWarningBtn = false;

        if (isMasjidAktif) {
            cardClass = 'card-aktif';
            badge = '<span class="status-badge badge-aktif">Telah Aktif</span>';
        } else {
            if (ageInDays <= 14) {
                cardClass = 'card-belajar'; 
                let sisaHari = Math.max(1, Math.ceil(14 - ageInDays));
                badge = `<span class="status-badge badge-belajar">Masa Belajar (${sisaHari} Hari Lagi)</span>`;
            } else {
                cardClass = 'card-pasif'; 
                badge = '<span class="status-badge badge-pasif">Pasif (Lebih dari 14 Hari)</span>';
                showWarningBtn = true;
            }
        }
        
        // Pesan WA dengan sapaan Ustadz
        const pesanWA = `Assalamu'alaikum Ustadz. Semoga selalu dalam lindungan Allah.\n\nKami dari tim pusat *Power of Masjid* memperhatikan bahwa sistem Layar TV dan Website untuk masjid Anda sudah didaftarkan lebih dari 14 hari, namun terpantau belum ada pergerakan kelengkapan data dasar (Kas/Jadwal/Galeri).\n\nMengingat kapasitas server kami saat ini dibatasi sangat eksklusif *hanya untuk 10 Masjid*, kami mohon konfirmasinya. Apabila sistem ini belum akan dimaksimalkan penggunaannya dalam waktu dekat, mohon izin akun Anda akan kami cabut/bekukan sementara waktu. Slot servernya akan kami berikan kepada masjid lain yang kebetulan sedang mengantre.\n\nKami tunggu pergerakan datanya atau konfirmasinya dalam 2x24 jam ya, Ustadz. Jika ada kendala teknis dalam pengisian, silakan sampaikan ke kami. Terima kasih atas pengertiannya. 🙏`;

        html += `
          <div class="card ${cardClass}">
             <h3>${m.nama}</h3>
             <p>Email: ${m.email}</p>
             ${badge}
             <div class="check-list">
                <div>${isKas ? '✅' : '❌'} Catat Transaksi Kas</div>
                <div>${isJdw ? '✅' : '❌'} Buat Jadwal Kegiatan</div>
                <div>${isGal ? '✅' : '❌'} Upload Foto Galeri</div>
             </div>
             ${showWarningBtn ? `<button class="btn-warning" onclick="copyWarning('${encodeURIComponent(pesanWA)}')">💬 Salin Pesan Teguran WA</button>` : ''}
          </div>
        `;
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('masjid-list').innerHTML = html;
      document.getElementById('kuota-text').innerText = masjidAktifTotal;
    }
  } catch(e) {
    document.getElementById('loading').innerText = 'Gagal memuat data. Periksa koneksi.';
  }
}

function copyWarning(encodedText) {
   const text = decodeURIComponent(encodedText);
   navigator.clipboard.writeText(text).then(() => {
       alert('Teks peringatan berhasil disalin! Silakan paste di chat WA Ustadz / Admin Masjid tersebut.');
   }).catch(err => {
       alert('Gagal menyalin teks.');
   });
}

loadSuperadmin();
</script>
</body>
</html>
