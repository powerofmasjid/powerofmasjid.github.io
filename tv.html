<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Display Power of Masjid — Perfect Ratio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&text=0123456789:&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #051A0F;
    --panel-bg: #0A2F1C;
    --gold: #C9A84C;
    --text: #E8F5EE;
    --masuk: #4ADE80;
    --border: rgba(201,168,76,0.3);
  }
  
  .tema-safir{--bg-dark:#050F1A;--panel-bg:#0F2240;--gold:#4C7AC9;}
  .tema-emas{--bg-dark:#1A1405;--panel-bg:#4A3810;--gold:#C9A84C;}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: all 0.5s ease; }
  
  #loading-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #loading-screen.hide { display: none; }
  .spinner-logo { width: 180px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* HEADER */
  .header { background: var(--panel-bg); padding: 0 30px; height: 110px; display: flex; align-items: center; border-bottom: 4px solid var(--gold); z-index: 100; gap: 20px; flex-shrink: 0; transition: transform 0.8s; }
  .logo-wrap { width: 85px; height: 85px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .info-masjid { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
  .nama-masjid { font-size: 34px; font-weight: 800; color: white; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alamat-masjid { font-size: 17px; color: var(--gold); opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-right { text-align: right; flex-shrink: 0; }
  
  /* UPGRADE: JAM DIGITAL */
  .jam-digital { font-size: 50px; font-weight: 700; color: var(--gold); font-family: 'Orbitron', sans-serif; line-height: 1; letter-spacing: 2px;}
  .tanggal-digital { font-size: 18px; color: white; margin-top: 5px; }

  /* SHOLAT BAR UPGRADE GLOWING */
  .sholat-bar { display: flex; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--border); height: 95px; align-items: center; padding: 0 5px; flex-shrink: 0; gap: 4px; transition: transform 0.8s; }
  .sholat-box { flex: 1; text-align: center; padding: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
  .sholat-box.aktif { background: var(--gold); border: 2px solid white; transform: scale(1.05); box-shadow: 0 0 25px var(--gold); z-index:2; position: relative;}
  .sholat-name { font-size: 13px; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
  .sholat-time { font-size: 34px; color: var(--gold); font-weight: 800; line-height: 1.1; font-family: 'Orbitron', sans-serif; letter-spacing: 1px;}
  .sholat-box.aktif .sholat-name, .sholat-box.aktif .sholat-time { color: var(--bg-dark); text-shadow: none; }

  /* MAIN CONTENT */
  .main { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; position: relative; }
  
  /* PANEL KIRI (SALDO & AMAL) */
  .left-panel { width: 34%; display: flex; flex-direction: column; position: relative; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .card-left { position: absolute; inset: 0; transition: all 0.8s ease-in-out; background: var(--panel-bg); border-radius: 20px; border: 2px solid var(--border); padding: 30px; display: flex; flex-direction: column; justify-content: center; text-align: center; opacity: 1; transform: translateX(0); }
  .card-left.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }
  .saldo-value { font-family: 'Amiri', serif; font-size: 75px; font-weight: 700; color: var(--masuk); line-height: 1; margin-top: 10px; }

  /* PANEL KANAN (MEDIA & AGENDA) */
  .right-panel { flex: 1; background: black; border-radius: 20px; border: 2px solid var(--border); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .content-right { position: absolute; inset: 0; transition: opacity 1s; opacity: 0; display: flex; align-items: center; justify-content: center; }
  .content-right.active { opacity: 1; }
  .media-img { width: 100%; height: 100%; object-fit: contain; }
  .media-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 40%); display: flex; align-items: flex-end; padding: 30px; }
  .media-title { font-size: 32px; font-weight: 800; color: white; text-shadow: 0 3px 15px black; }

  /* AGENDA SCROLL */
  .agenda-container { background: var(--panel-bg); width: 100%; height: 100%; padding: 40px; display: flex; flex-direction: column; text-align: left; overflow: hidden; }
  .agenda-header { border-bottom: 3px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; font-size: 36px; font-weight: 800; color: var(--gold); z-index: 10; background: var(--panel-bg); }
  .agenda-scroll-wrapper { flex: 1; overflow: hidden; position: relative; }
  .agenda-scroll-content { position: absolute; width: 100%; animation: scrollUp 20s linear infinite; }
  .agenda-item { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid var(--gold); }
  .agenda-judul { font-size: 28px; font-weight: 700; color: white; margin-bottom: 5px; }
  @keyframes scrollUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }

  /* FOOTER */
  .footer { background: var(--gold); height: 80px; color: var(--bg-dark); display: flex; align-items: center; overflow: hidden; z-index: 100; border-top: 4px solid var(--bg-dark); transition: transform 0.8s; }
  .footer-label { background: var(--bg-dark); color: var(--gold); height: 100%; display: flex; align-items: center; padding: 0 35px; font-size: 28px; font-weight: 900; border-right: 5px solid var(--gold); flex-shrink: 0; }
  .marquee-text { display: inline-block; white-space: nowrap !important; font-size: 40px; font-weight: 800; padding-left: 100%; animation: marquee 40s linear infinite; line-height: 80px; }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

  /* FULLSCREEN MODES */
  body.mode-amal .header, body.mode-amal .sholat-bar,
  body.mode-widescreen .header, body.mode-widescreen .sholat-bar,
  body.mode-live .header, body.mode-live .sholat-bar { 
    display: none !important; 
  }
  body.mode-amal .right-panel { display: none !important; }
  body.mode-amal .left-panel { width: 100%; flex: 1; border: none; background: transparent; }
  body.mode-amal #panel-amal { background: var(--bg-dark); border-color: var(--masuk); }
  body.mode-widescreen .left-panel,
  body.mode-live .left-panel { display: none !important; }
  body.mode-widescreen .right-panel,
  body.mode-live .right-panel { flex: 1; border-radius: 20px; }

  /* LAYAR IQOMAH UPGRADE */
  #iqomah-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: opacity 1s; }
  #iqomah-screen.hide { opacity: 0; pointer-events: none; }
  .iq-title { font-size: 55px; color: white; font-weight: 700; letter-spacing: 3px; margin-bottom: 5px; }
  .iq-name { font-size: 110px; color: var(--gold); font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 20px; text-shadow: 0 0 35px var(--gold); }
  .iq-subtitle { font-size: 40px; color: rgba(255,255,255,0.9); margin-bottom: 10px; }
  .iq-timer { font-size: 280px; font-weight: 800; color: var(--masuk); font-family: 'Orbitron', sans-serif; line-height: 1; text-shadow: 0 0 60px var(--masuk); letter-spacing: 5px;}
</style>
</head>
<body>

  <div id="iqomah-screen" class="hide">
    <div class="iq-title">WAKTU SHOLAT</div>
    <div class="iq-name" id="iq-name">SUBUH</div>
    <div class="iq-subtitle" id="iq-subtitle">Menuju Iqomah</div>
    <div class="iq-timer" id="iq-timer">00:00</div>
  </div>

  <div id="loading-screen">
    <img src="Logo Power of Masjid.png" class="spinner-logo" onerror="this.src='https://via.placeholder.com/200?text=Power+Masjid'">
    <div style="font-size: 22px; color: var(--gold); margin-top: 25px; font-weight: bold; letter-spacing: 2px;">SINKRONISASI TV...</div>
  </div>

  <div class="header">
    <div class="logo-wrap" id="tv-logo-wrap"><div style="font-size:40px; color:var(--gold); font-family:'Amiri'">م</div></div>
    <div class="info-masjid"><div class="nama-masjid" id="tv-nama">...</div><div class="alamat-masjid" id="tv-alamat">...</div></div>
    <div class="header-right"><div class="jam-digital" id="jam">00:00:00</div><div class="tanggal-digital" id="tanggal">-</div></div>
  </div>

  <div class="sholat-bar" id="sholat-bar"></div>

  <div class="main">
    <div class="left-panel">
      <div class="card-left" id="panel-saldo">
        <div style="font-size: 26px; font-weight: 800; color: var(--gold); margin-bottom: 5px;">SALDO KAS UMAT</div>
        <div class="saldo-value" id="tv-saldo">Rp 0</div>
      </div>
      
      <div class="card-left hidden" id="panel-amal" style="border: 4px solid var(--masuk);">
        </div>
    </div>

    <div class="right-panel" id="tv-right-panel">
      <div class="content-right active" id="konten-media"></div>
      <div class="content-right" id="konten-agenda">
        <div class="agenda-container">
          <div class="agenda-header">AGENDA MASJID RUTIN</div>
          <div class="agenda-scroll-wrapper"><div class="agenda-scroll-content" id="list-agenda-full"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer"><div class="footer-label">INFO</div><div style="flex:1; overflow:hidden;"><div class="marquee-text" id="tv-pengumuman"></div></div></div>

<script>
// LINK API BARU
const API_URL = 'https://script.google.com/macros/s/AKfycbzdDj9Ifaic7LEBBXU-8Wa3zfeaW32lq1qEl2N7LXcKvqHBbt8axrwAs92Fevno0U2Sqw/exec';

let ID_MASJID = ''; let globalSholatList = [];
let playlist = []; let playIndex = 0; let masterTimer;
let isIqomahMode = false; let iqomahTargetTime = null; let jedaConfig = { Subuh: 10, Dzuhur: 10, Ashar: 10, Maghrib: 10, Isya: 10 };

function getSlug() { const p = new URLSearchParams(window.location.search); return p.get('masjid') || 'annuriyah-tanjungbarat'; }

function matenginLink(url) {
  if (!url) return ''; 
  if (url.includes('youtube.com') || url.includes('youtu.be')) return url;
  let id = ''; const match = url.match(/(?:id=|v=|\/d\/|uc\?id=)([\w-]+)/);
  if (match) id = match[1]; return id ? 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1920' : url;
}

function getYoutubeEmbed(url) {
  let vidId = ''; 
  if(url.includes('youtu.be/')) vidId = url.split('youtu.be/')[1].split('?')[0]; 
  else if(url.includes('v=')) vidId = url.split('v=')[1].split('&')[0]; 
  else if(url.includes('live/')) vidId = url.split('live/')[1].split('?')[0];
  return vidId ? `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${vidId}` : '';
}

// FUNGSI ALARM DIGITAL (WEB AUDIO API - 5 DETIK)
function playAlarm() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    // Bunyi bip 5 kali (total 5 detik)
    for(let i=0; i<5; i++) {
      setTimeout(() => {
        if(ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine'; // Suara jernih
        osc.frequency.setValueAtTime(880, ctx.currentTime); // Nada tinggi (A5)
        gain.gain.setValueAtTime(1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      }, i * 1000);
    }
  } catch(e) { console.log("Alarm Audio dilarang oleh browser. Pastikan sudah klik layar sekali."); }
}

function updateTime() {
  const n = new Date(); 
  document.getElementById('jam').innerText = n.toLocaleTimeString('id-ID', {hour12: false});
  const o = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }; 
  document.getElementById('tanggal').innerText = n.toLocaleDateString('id-ID', o);
  
  if (!isIqomahMode && globalSholatList.length > 0) {
    const currentHM = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    if (n.getSeconds() === 0) {
      const sholat = globalSholatList.find(s => s.t === currentHM && ['Subuh', 'Dzuhur', 'Ashar', 'Maghrib', 'Isya'].includes(s.n));
      if (sholat) {
        isIqomahMode = true;
        document.getElementById('iqomah-screen').classList.remove('hide');
        
        if (n.getDay() === 5 && sholat.n === 'Dzuhur') {
          document.getElementById('iq-name').innerText = "JUM'AT";
          document.getElementById('iq-subtitle').innerText = "Mendengarkan Khutbah...";
          document.getElementById('iq-timer').style.display = 'none';
          setTimeout(() => { 
            isIqomahMode = false;
            document.getElementById('iqomah-screen').classList.add('hide');
            document.getElementById('iq-timer').style.display = 'block';
          }, 45 * 60000); 
        } else {
          // BUNYIKAN ALARM SAAT ADZAN MASUK
          playAlarm();
          
          document.getElementById('iq-name').innerText = sholat.n;
          document.getElementById('iq-subtitle').innerText = "Menuju Iqomah";
          let jedaMenit = jedaConfig[sholat.n] || 10;
          iqomahTargetTime = new Date(n.getTime() + (jedaMenit * 60000));
        }
      }
    }
  }

  if (isIqomahMode && iqomahTargetTime) {
    let diffMs = iqomahTargetTime.getTime() - n.getTime();
    if (diffMs <= 0) {
      if (iqomahTargetTime !== null) {
          // BUNYIKAN ALARM SAAT IQOMAH TIBA (TIMER 00:00)
          playAlarm();
          
          document.getElementById('iq-subtitle').innerText = "LURUSKAN DAN RAPATKAN SHAF";
          document.getElementById('iq-timer').innerText = "00:00";
          document.getElementById('iq-timer').style.color = "red";
          iqomahTargetTime = null; // Mencegah alarm berulang kali
          
          setTimeout(() => { 
            isIqomahMode = false;
            document.getElementById('iqomah-screen').classList.add('hide');
            document.getElementById('iq-timer').style.color = "var(--masuk)"; 
          }, 15 * 60000); 
      }
    } else {
      let diffSec = Math.floor(diffMs / 1000);
      let m = Math.floor(diffSec / 60);
      let s = diffSec % 60;
      document.getElementById('iq-timer').innerText = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }
  }
}
setInterval(updateTime, 1000);

function jalankanTV() {
  clearTimeout(masterTimer);
  if (playlist.length === 0) return;
  if (playIndex >= playlist.length) playIndex = 0;
  
  let currentItem = playlist[playIndex];
  let nextDelay = 15000;
  
  document.body.className = ''; 
  document.getElementById('panel-amal').classList.add('hidden');
  document.getElementById('panel-saldo').classList.remove('hidden');
  document.getElementById('konten-media').classList.remove('active');
  document.getElementById('konten-agenda').classList.remove('active');
  
  // 1. TAMPILAN SALDO & AGENDA (SESUAI KOTAK)
  if (currentItem.type === 'SALDO') {
     document.getElementById('konten-agenda').classList.add('active');
     nextDelay = 20000; // Saldo 20 detik
  }
  // 2. TAMPILAN MEDIA (GALERI / VIDEO)
  else if (currentItem.type === 'MEDIA') {
     const m = currentItem.data;
     let isYt = m.url.includes('youtube.com') || m.url.includes('youtu.be');
     let isLive = m.url.toLowerCase().includes('live');
     let tipeVisual = String(m.tipe).toUpperCase();
     
     if (isLive) { document.body.classList.add('mode-widescreen'); nextDelay = 3600000; } 
     else if (tipeVisual.includes('FLYER') || tipeVisual.includes('POSTER') || tipeVisual.includes('BROSUR')) { document.body.classList.add('mode-widescreen'); nextDelay = 30000; } // Flyer 30s
     else if (isYt) { nextDelay = 90000; } // Video YouTube 1.5 Menit
     else { nextDelay = 15000; } // Foto Biasa 15 Detik
     
     let pMedia = document.getElementById('konten-media');
     if(isYt) pMedia.innerHTML = `<iframe class="media-img" src="${getYoutubeEmbed(m.url)}" allow="autoplay"></iframe>`;
     else pMedia.innerHTML = `<img class="media-img" src="${matenginLink(m.url)}"><div class="media-overlay"><div class="media-title">${m.judul}</div></div>`;
     pMedia.classList.add('active');
  } 
  // 3. TAMPILAN AMAL / KURBAN (LAYAR PENUH)
  else if (currentItem.type === 'AMAL') {
     const a = currentItem.data;
     const partisipan = a.partisipan || [];
     
     let html = `<div style="font-size: 50px; font-weight: 800; color: white; line-height: 1.2; text-transform: uppercase;">${a.judul}</div>`;
     let targetDana = Number(a.harga_target) || Number(a.target) || 0;
     
     if (a.tipe === 'KURBAN') {
         let sapiKol = []; let sapiUtuh = []; let kambing = [];
         partisipan.forEach(d => { 
            if(d.jenis === 'Sapi Kolektif') sapiKol.push(d); 
            else if(d.jenis === 'Sapi Utuh' || d.jenis === 'Sapi Mandiri') sapiUtuh.push(d);
            else kambing.push(d);
         });
         
         // HITUNGAN SAPI KOLEKTIF UNTUK CTA
         let totalSapiKolPenuh = Math.floor(sapiKol.length / 7);
         let sisaSapiKol = sapiKol.length % 7;
         let slotTersedia = 7 - sisaSapiKol;
         
         if (sisaSapiKol > 0) {
             html += `<div style="margin-top:30px; background:rgba(74,222,128,0.15); border:3px solid var(--masuk); border-radius:20px; padding:25px; text-align:center;">
                 <div style="font-size:35px; color:white; font-weight:800; margin-bottom:10px;">MARI BERGABUNG! 🐄</div>
                 <div style="font-size:45px; color:var(--masuk); font-weight:900;">MASIH BUTUH <span style="font-size:60px; color:var(--gold);">${slotTersedia}</span> ORANG LAGI</div>
                 <div style="font-size:25px; color:rgba(255,255,255,0.8); font-weight:600; margin-top:5px;">Untuk melengkapi Sapi Kolektif Ke-${totalSapiKolPenuh + 1}</div>
             </div>`;
         } else {
             html += `<div style="margin-top:30px; background:rgba(74,222,128,0.15); border:3px solid var(--masuk); border-radius:20px; padding:25px; text-align:center;">
                 <div style="font-size:35px; color:white; font-weight:800; margin-bottom:10px;">ALHAMDULILLAH 🐄</div>
                 <div style="font-size:45px; color:var(--masuk); font-weight:900;">DIBUKA SAPI KOLEKTIF KE-${totalSapiKolPenuh + 1}</div>
                 <div style="font-size:25px; color:rgba(255,255,255,0.8); font-weight:600; margin-top:5px;">Tersedia 7 Slot Kosong</div>
             </div>`;
         }

         // INFO TAMBAHAN JUMLAH HEWAN
         html += `<div style="display:flex; justify-content:center; gap:20px; margin-top:30px;">`;
         if (totalSapiKolPenuh > 0) {
             html += `<div style="background:rgba(255,255,255,0.05); border:2px solid var(--border); border-radius:15px; padding:15px; width:220px;">
                 <div style="font-size:20px; color:var(--gold); font-weight:bold;">Sapi Kol. Penuh</div>
                 <div style="font-size:35px; font-weight:900; color:white; margin-top:5px;">${totalSapiKolPenuh} Ekor</div>
             </div>`;
         }
         if (sapiUtuh.length > 0) {
             html += `<div style="background:rgba(255,255,255,0.05); border:2px solid var(--border); border-radius:15px; padding:15px; width:220px;">
                 <div style="font-size:20px; color:var(--gold); font-weight:bold;">Sapi Mandiri</div>
                 <div style="font-size:35px; font-weight:900; color:white; margin-top:5px;">${sapiUtuh.length} Ekor</div>
             </div>`;
         }
         if (kambing.length > 0) {
             html += `<div style="background:rgba(255,255,255,0.05); border:2px solid var(--border); border-radius:15px; padding:15px; width:220px;">
                 <div style="font-size:20px; color:var(--gold); font-weight:bold;">Kambing/Domba</div>
                 <div style="font-size:35px; font-weight:900; color:white; margin-top:5px;">${kambing.length} Ekor</div>
             </div>`;
         }
         html += `</div>`;
         
     } else { 
         let tUang = 0;
         partisipan.forEach(d => { if(Number(d.nominal) > 0) tUang += Number(d.nominal); });
         
         html += `<div style="font-size: 24px; font-weight: 600; color: rgba(255,255,255,0.8); margin-top: 30px; letter-spacing:2px;">TOTAL TERKUMPUL</div>`;
         html += `<div style="font-size: 75px; font-weight: 800; color: var(--gold); font-family: 'Amiri', serif; line-height:1.1;">Rp ${tUang.toLocaleString("id-ID")}</div>`;
         
         if (targetDana > 0) {
             let progress = Math.min(Math.round((tUang / targetDana) * 100), 100);
             html += `<div style="margin-top:25px; width:85%; margin-left:auto; margin-right:auto;">
                         <div style="display:flex; justify-content:space-between; color:white; font-size:20px; font-weight:bold; margin-bottom:10px;">
                             <span>Tercapai ${progress}%</span>
                             <span>Target: Rp ${targetDana.toLocaleString("id-ID")}</span>
                         </div>
                         <div style="background:rgba(255,255,255,0.2); height:16px; border-radius:10px; overflow:hidden;">
                             <div style="background:var(--masuk); height:100%; width:${progress}%; transition:width 1s ease-in-out;"></div>
                         </div>
                      </div>`;
         }
         html += `<div style="font-size: 20px; font-weight: 600; color: var(--masuk); margin-top: 20px;">DARI ${partisipan.length} MUNFIQ</div>`;
     }
     
     let teksDeskripsi = a.keterangan || a.deskripsi || a.isi || "";
     teksDeskripsi = teksDeskripsi.split('|||')[0]; 
     if(teksDeskripsi) {
         html += `<div style="font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.9); margin-top: 35px; white-space: pre-wrap; line-height: 1.5; border-top: 2px dashed rgba(255,255,255,0.2); padding-top: 25px;">${teksDeskripsi}</div>`;
     }
     
     document.getElementById('panel-amal').innerHTML = html;
     
     document.body.classList.add('mode-amal');
     document.getElementById('panel-saldo').classList.add('hidden');
     document.getElementById('panel-amal').classList.remove('hidden');
     nextDelay = 30000; // Amal 30 Detik
  }
  
  playIndex++;
  masterTimer = setTimeout(jalankanTV, nextDelay);
}

async function loadData() {
  try {
    const rM = await fetch(API_URL + '?action=getMasjidBySlug&slug=' + getSlug());
    const jM = await rM.json();
    if(jM.status === 'ok') {
      ID_MASJID = jM.data.id_masjid;
      document.getElementById('tv-nama').innerText = jM.data.nama;
      document.getElementById('tv-alamat').innerText = jM.data.alamat + ', ' + jM.data.kota;
      if(jM.data.logo_url) document.getElementById('tv-logo-wrap').innerHTML = `<img src="${matenginLink(jM.data.logo_url)}">`;
      if(jM.data.tema) { document.body.className = ''; document.body.classList.add('tema-' + jM.data.tema); }
      
      jedaConfig = {
        Subuh: parseInt(jM.data.jeda_subuh) || 10, Dzuhur: parseInt(jM.data.jeda_dzuhur) || 10,
        Ashar: parseInt(jM.data.jeda_ashar) || 10, Maghrib: parseInt(jM.data.jeda_maghrib) || 10,
        Isya: parseInt(jM.data.jeda_isya) || 10
      };
      
      if(jM.data.latitude && jM.data.longitude) calcSholat(jM.data.latitude, jM.data.longitude);
    }
    
    const [resS, resP, resG, resA, resK] = await Promise.all([
      fetch(API_URL + '?action=getSaldo&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getPengumuman&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getGaleri&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getProgramAmal&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getJadwal&id_masjid=' + ID_MASJID).then(r => r.json())
    ]);
    
    if(resS.status === 'ok') document.getElementById('tv-saldo').innerText = "Rp " + Number(resS.data.saldo).toLocaleString("id-ID");

    let rawPlaylist = [];
    
    if(resA.status === 'ok') {
        let detailPromises = resA.data.map(p => {
            let act = p.tipe==='KURBAN' ? 'getKurban' : (p.tipe==='ZAKAT' ? 'getZakat' : 'getInfaq');
            return fetch(API_URL + '?action=' + act + '&id_masjid=' + ID_MASJID + '&id_program=' + p.id).then(r => r.json());
        });
        let details = await Promise.all(detailPromises);
        for(let i=0; i<resA.data.length; i++) {
            resA.data[i].partisipan = (details[i].status === 'ok') ? details[i].data : [];
            rawPlaylist.push({ type: 'AMAL', data: resA.data[i] });
        }
    }

    if(resG.status === 'ok') {
        resG.data.forEach(g => rawPlaylist.push({ type: 'MEDIA', data: g }));
    }

    if(resK.status === 'ok') {
        let htmlAgendaLain = resK.data.map(k => `<div class="agenda-item"><div class="agenda-judul">${k.nama_kegiatan}</div><div style="color:var(--gold); font-size:22px; font-weight:600;">${k.jadwal} | ${k.lokasi}</div></div>`).join('');
        document.getElementById('list-agenda-full').innerHTML = htmlAgendaLain;
    }
    rawPlaylist.push({ type: 'SALDO' }); 
    
    // ALGORITMA SELANG-SELING (ZIPPER)
    let fullItems = [];
    let normItems = [];
    
    rawPlaylist.forEach(item => {
        if (item.type === 'AMAL') {
            fullItems.push(item);
        } else if (item.type === 'MEDIA') {
            let m = item.data;
            let isLive = m.url.toLowerCase().includes('live');
            let tipeVisual = String(m.tipe).toUpperCase();
            if (isLive || tipeVisual.includes('FLYER') || tipeVisual.includes('POSTER') || tipeVisual.includes('BROSUR')) {
                fullItems.push(item);
            } else {
                normItems.push(item);
            }
        } else {
            normItems.push(item); // Saldo
        }
    });

    let interleavedPlaylist = [];
    let fIdx = 0, nIdx = 0;
    let turnFull = true;
    
    while (fIdx < fullItems.length || nIdx < normItems.length) {
        if (turnFull) {
            if (fIdx < fullItems.length) interleavedPlaylist.push(fullItems[fIdx++]);
            else if (nIdx < normItems.length) interleavedPlaylist.push(normItems[nIdx++]);
            turnFull = false;
        } else {
            if (nIdx < normItems.length) interleavedPlaylist.push(normItems[nIdx++]);
            else if (fIdx < fullItems.length) interleavedPlaylist.push(fullItems[fIdx++]);
            turnFull = true;
        }
    }
    
    playlist = interleavedPlaylist;

    let gabunganPengumuman = "";
    if(resP.status === 'ok' && Array.isArray(resP.data) && resP.data.length > 0) {
      gabunganPengumuman = resP.data.map(p => `✦ ${p.judul}: ${(p.isi || "").replace(/(\r\n|\n|\r)/gm, " ")}`).join('   ✦   ');
    }
    
    let pengumumanEl = document.getElementById('tv-pengumuman');
    pengumumanEl.innerText = gabunganPengumuman;
    if (gabunganPengumuman.length > 0) {
        let kecepatanMarquee = Math.max(40, gabunganPengumuman.length * 0.2); 
        pengumumanEl.style.animationDuration = kecepatanMarquee + 's';
    }

    document.getElementById('loading-screen').classList.add('hide');
    if(!masterTimer) jalankanTV();

  } catch(e) { console.log(e); }
}

async function calcSholat(lat, lon) {
  if(!lat || !lon) return;
  var d = new Date();
  var url = `https://api.aladhan.com/v1/timings/${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}?latitude=${lat}&longitude=${lon}&method=3`;
  try {
    var res = await fetch(url); var j = await res.json();
    if(j.code === 200) {
      var t = j.data.timings;

      var KOREKSI_MENIT = 0;
      function sesuaikanWaktu(timeStr, tambahLagi = 0) {
         let [h, m] = timeStr.split(':').map(Number);
         m += (KOREKSI_MENIT + tambahLagi);
         h += Math.floor(m / 60);
         m = ((m % 60) + 60) % 60;
         h = ((h % 24) + 24) % 24;
         return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      }

      globalSholatList = [
        {n:'Imsak', t:sesuaikanWaktu(t.Imsak)}, {n:'Subuh', t:sesuaikanWaktu(t.Fajr)}, {n:'Terbit', t:sesuaikanWaktu(t.Sunrise)},
        {n:'Dhuha', t:sesuaikanWaktu(t.Sunrise, 20)}, {n:'Dzuhur', t:sesuaikanWaktu(t.Dhuhr)},
        {n:'Ashar', t:sesuaikanWaktu(t.Asr)}, {n:'Maghrib', t:sesuaikanWaktu(t.Maghrib)}, {n:'Isya', t:sesuaikanWaktu(t.Isha)}
      ];
      
      const now = d.getHours()*60 + d.getMinutes(); let cur = -1;
      for(let i=0; i<globalSholatList.length; i++){ 
        let p=globalSholatList[i].t.split(':'); 
        if(now <= parseInt(p[0])*60 + parseInt(p[1])){ cur=i; break; } 
      }
      if(cur===-1) cur=0;
      
      document.getElementById('sholat-bar').innerHTML = globalSholatList.map((s,i) => `<div class="sholat-box ${i===cur?'aktif':''}"><div class="sholat-name">${s.n}</div><div class="sholat-time">${s.t}</div></div>`).join('');
    }
  } catch(e) { console.log("Gagal sinkron sholat"); }
}

loadData(); 
setInterval(loadData, 900000); 
</script>
