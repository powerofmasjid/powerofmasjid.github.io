<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Display Power of Masjid — Premium Layout</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&text=0123456789:&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #051A0F; --panel-bg: #0A2F1C; --gold: #C9A84C; --text: #E8F5EE; --masuk: #6EE7B7; --border: rgba(201,168,76,0.3);
  }
  .tema-emas { --bg-dark: #111111; --panel-bg: #222222; --gold: #FBBF24; --masuk: #FDE68A; --border: rgba(251,191,36,0.3); }
  .tema-safir { --bg-dark: #020617; --panel-bg: #0F172A; --gold: #FDE047; --masuk: #38BDF8; --border: rgba(253,224,71,0.2); }
  .tema-tembaga { --bg-dark: #2A0404; --panel-bg: #450A0A; --gold: #FDBA74; --masuk: #FEE2E2; --border: rgba(253,186,116,0.2); }
  .tema-perak { --bg-dark: #09090B; --panel-bg: #18181B; --gold: #E5E7EB; --masuk: #10B981; --border: rgba(229,231,235,0.15); }

  .tema-putih { 
      --bg-dark: #E2E8F0; --panel-bg: #FFFFFF; --gold: #059669; --masuk: #D97706; --text: #1F2937; --border: rgba(0,0,0,0.05);
  }
  .tema-abuterang { 
      --bg-dark: #E5E7EB; --panel-bg: #F9FAFB; --gold: #2563EB; --masuk: #EA580C; --text: #111827; --border: rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: radial-gradient(circle at center top, var(--panel-bg) 0%, var(--bg-dark) 100%); 
      color: var(--text); 
      overflow: hidden; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      transition: all 0.5s ease; 
  }
  
  #loading-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #loading-screen.hide { display: none; }
  .spinner-logo { width: 180px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  .header { 
      background: rgba(0, 0, 0, 0.25); 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px);
      padding: 0 30px; 
      height: 110px; 
      display: flex; 
      align-items: center; 
      border-bottom: 1px solid rgba(255,255,255,0.1); 
      z-index: 100; 
      gap: 20px; 
      flex-shrink: 0; 
  }
  .logo-wrap { width: 85px; height: 85px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .info-masjid { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  .nama-masjid { font-size: 34px; font-weight: 800; color: white; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alamat-masjid { font-size: 17px; color: var(--gold); opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-right { text-align: right; flex-shrink: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  
  .jam-digital { font-size: 50px; font-weight: 700; color: var(--gold); font-family: 'Orbitron', sans-serif; line-height: 1; letter-spacing: 2px; text-shadow: 0 0 20px rgba(201,168,76,0.5); }
  .tanggal-digital { font-size: 18px; color: white; margin-top: 5px; }

  .sholat-bar { display: flex; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); height: 95px; align-items: center; padding: 0 5px; flex-shrink: 0; gap: 6px; }
  .sholat-box { flex: 1; text-align: center; padding: 10px 0; border-radius: 12px; border: 1px solid transparent; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  
  .sholat-box.aktif { 
      background: linear-gradient(135deg, var(--gold) 0%, #FFF 100%); 
      border: none; 
      transform: scale(1.08); 
      box-shadow: 0 10px 30px rgba(201,168,76,0.6); 
      z-index: 2; 
      position: relative;
  }
  .sholat-name { font-size: 13px; color: rgba(255,255,255,0.7); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
  .sholat-time { font-size: 34px; color: var(--gold); font-weight: 800; line-height: 1.1; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; text-shadow: 0 0 15px rgba(201,168,76,0.4); }
  .sholat-box.aktif .sholat-name { color: var(--panel-bg); text-shadow: none; }
  .sholat-box.aktif .sholat-time { color: var(--bg-dark); text-shadow: none; }

  .main { flex: 1; display: flex; padding: 12px 16px 14px; gap: 14px; overflow: hidden; position: relative; }
  .left-panel { width: 38%; display: flex; flex-direction: column; gap: 12px; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2; }
  
  .card-saldo, .card-info, .right-panel, #panel-amal { 
      background: rgba(0, 0, 0, 0.25); 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px; 
      border: 1px solid rgba(255,255,255,0.1); 
      box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
  }
  
  .card-saldo { padding: 16px 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 30%; text-align: center; }
  .saldo-title { font-size: 24px; font-weight: 800; color: var(--gold); margin-bottom: 5px; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  .saldo-value { font-family: 'Amiri', serif; font-size: 65px; font-weight: 700; color: var(--masuk); line-height: 1.1; white-space: nowrap; text-shadow: 0 0 40px rgba(110,231,183,0.3); }

  .card-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .info-header { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 16px 18px; font-size: 23px; font-weight: 800; color: var(--gold); background: rgba(0,0,0,0.4); text-align: center; z-index: 10; flex-shrink: 0; letter-spacing: 1px;}
  .info-body { flex: 1; overflow: hidden; position: relative; }
  
  .agenda-scroll-wrapper { width: 100%; height: 100%; position: relative; overflow: hidden; padding: 14px 16px; }
  .agenda-scroll-content { width: 100%; height: 100%; }
  .agenda-list-static { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 12px; animation: fadeIn 0.8s ease-in-out; }
  .agenda-item { background: rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 12px; border-left: 5px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
  .agenda-item.agenda-single { min-height: 100%; display: flex; flex-direction: column; justify-content: center; animation: agendaMasuk 0.8s ease-out; }
  .agenda-judul { font-size: 23px; font-weight: 800; color: white; margin-bottom: 7px; line-height: 1.28; }
  .agenda-meta { color: var(--gold); font-size: 18px; font-weight: 700; line-height: 1.35; }
  .agenda-note { color: rgba(255,255,255,0.82); font-size: 16px; line-height: 1.4; margin-top: 10px; font-weight: 600; }
  .agenda-page-label { font-size: 14px; color: rgba(255,255,255,0.65); text-align: center; margin-top: 12px; font-weight: 700; letter-spacing: 1px; }
  @keyframes agendaMasuk { 0% { opacity: 0; transform: translateY(18px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes scrollUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }

  .hikmah-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 30px; text-align: center; animation: fadeIn 1s ease-in-out; }
  .hikmah-icon { font-size: 60px; color: var(--gold); margin-bottom: 15px; opacity: 0.5; line-height: 1; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  .hikmah-isi { font-size: 28px; font-weight: 600; color: white; line-height: 1.6; margin-bottom: 25px; font-style: italic; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
  .hikmah-sumber { font-size: 18px; color: var(--gold); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; background: rgba(201,168,76,0.15); padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(201,168,76,0.3); }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  .right-panel { flex: 1; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .content-right { position: absolute; inset: 0; transition: opacity 1s; opacity: 0; display: flex; align-items: center; justify-content: center; background: #000; }
  .content-right.active { opacity: 1; }
  .media-img { width: 100%; height: 100%; object-fit: contain; }
  .media-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 50%); display: flex; align-items: flex-end; padding: 40px; }
  .media-title { font-size: 36px; font-weight: 800; color: white; text-shadow: 0 4px 20px black; }

  .desain-klasik .header { border-bottom: 3px solid var(--gold); }
  .desain-klasik .logo-wrap { border-radius: 20px 0 20px 0; border: 2px solid var(--gold); }
  .desain-klasik .card-saldo, .desain-klasik .card-info, .desain-klasik .right-panel { border-radius: 40px 0 40px 0; border: 2px solid var(--gold); }
  .desain-klasik .info-header { font-family: 'Amiri', serif; font-size:28px;}
  .desain-klasik .sholat-box { border-radius: 15px 0 15px 0; }
  
  .desain-minimalis .header { border-bottom: 1px solid rgba(255,255,255,0.1); background: transparent; box-shadow:none;}
  .desain-minimalis .card-saldo, .desain-minimalis .card-info, .desain-minimalis .right-panel { border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); box-shadow: none; }
  .desain-minimalis .sholat-bar { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.1); box-shadow:none;}
  .desain-minimalis .sholat-box { border: none; border-radius: 8px; }
  .desain-minimalis .sholat-box.aktif { background: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(255,255,255,0.1); border: 1px solid var(--gold); }
  .desain-minimalis .sholat-box.aktif .sholat-name, .desain-minimalis .sholat-box.aktif .sholat-time { color: var(--gold); text-shadow: none; }

  body.tema-putih, body.tema-abuterang { background: var(--bg-dark) !important; }

  .tema-putih .header, .tema-abuterang .header, 
  .tema-putih .sholat-bar, .tema-abuterang .sholat-bar, 
  .tema-putih .card-saldo, .tema-abuterang .card-saldo, 
  .tema-putih .card-info, .tema-abuterang .card-info, 
  .tema-putih .right-panel, .tema-abuterang .right-panel, 
  .tema-putih #panel-amal, .tema-abuterang #panel-amal { 
      background: rgba(255,255,255,0.95) !important; 
      border: 1px solid rgba(0,0,0,0.08) !important; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.06) !important; 
      backdrop-filter: blur(10px);
  }

  .tema-putih .content-right, .tema-abuterang .content-right { background: #F3F4F6 !important; }

  .tema-putih .nama-masjid, .tema-abuterang .nama-masjid,
  .tema-putih .tanggal-digital, .tema-abuterang .tanggal-digital,
  .tema-putih .agenda-judul, .tema-abuterang .agenda-judul,
  .tema-putih .hikmah-isi, .tema-abuterang .hikmah-isi,
  .tema-putih .iq-title, .tema-abuterang .iq-title,
  .tema-putih .media-title, .tema-abuterang .media-title,
  .tema-putih .saldo-title, .tema-abuterang .saldo-title,
  .tema-putih .alamat-masjid, .tema-abuterang .alamat-masjid {
      color: var(--text) !important;
      text-shadow: none !important;
  }

  .tema-putih .jam-digital, .tema-abuterang .jam-digital,
  .tema-putih .sholat-time, .tema-abuterang .sholat-time,
  .tema-putih .saldo-value, .tema-abuterang .saldo-value { text-shadow: none !important; }

  .tema-putih .sholat-name, .tema-abuterang .sholat-name,
  .tema-putih .iq-subtitle, .tema-abuterang .iq-subtitle { color: rgba(0,0,0,0.6) !important; }

  .tema-putih .logo-wrap, .tema-abuterang .logo-wrap { background: white; border-color: rgba(0,0,0,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

  .tema-putih .info-header, .tema-abuterang .info-header { background: rgba(0,0,0,0.03); color: var(--gold); border-bottom: 1px solid rgba(0,0,0,0.05); text-shadow: none; }

  .tema-putih .agenda-item, .tema-abuterang .agenda-item { background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); border-left: 5px solid var(--gold); }

  .tema-putih .sholat-box.aktif .sholat-name, .tema-abuterang .sholat-box.aktif .sholat-name,
  .tema-putih .sholat-box.aktif .sholat-time, .tema-abuterang .sholat-box.aktif .sholat-time { color: #FFFFFF !important; }

  .tema-putih .amal-cta-box, .tema-abuterang .amal-cta-box,
  .tema-putih .amal-stat-box, .tema-abuterang .amal-stat-box { background: white !important; border-color: rgba(0,0,0,0.1) !important; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

  .tema-putih .footer, .tema-abuterang .footer { background: white; border-top: 1px solid rgba(0,0,0,0.1); box-shadow:none; }
  .tema-putih .footer-label, .tema-abuterang .footer-label { background: var(--gold); color: white; border-right: none;}
  .tema-putih .marquee-text, .tema-abuterang .marquee-text { color: var(--text); }

  body.mode-widescreen .left-panel, body.mode-live .left-panel { display: none !important; }
  body.mode-widescreen .right-panel, body.mode-live .right-panel { flex: 1; }

  body.desain-klasik.mode-widescreen .right-panel, body.desain-klasik.mode-live .right-panel { border-radius: 60px 0 60px 0 !important; border: 3px solid var(--gold) !important; }
  body.desain-minimalis.mode-widescreen .right-panel, body.desain-minimalis.mode-live .right-panel { border-radius: 10px !important; }

  body.mode-amal .header, body.mode-amal .sholat-bar { display: none !important; }
  body.mode-amal .right-panel { display: none !important; }
  body.mode-amal .left-panel { width: 100%; flex: 1; border: none; background: transparent; box-shadow: none !important; }
  body.mode-amal .card-saldo, body.mode-amal .card-info { display: none !important; }

  #panel-amal { display: none; width: 100%; height: 100%; padding: 50px; flex-direction: column; justify-content: center; text-align: center; }
  body.mode-amal #panel-amal { display: flex !important; animation: fadeIn 1s; }

  body.desain-klasik.mode-amal #panel-amal { border-radius: 60px 0 60px 0 !important; border: 3px solid var(--gold) !important; }
  body.desain-minimalis.mode-amal #panel-amal { border-radius: 10px !important; }

  .amal-cta-box { border-radius: 20px; }
  .amal-stat-box { border-radius: 15px; }
  .desain-klasik .amal-cta-box { border-radius: 30px 0 30px 0 !important; border-color: var(--gold) !important; }
  .desain-klasik .amal-stat-box { border-radius: 20px 0 20px 0 !important; border-color: var(--gold) !important; }
  .desain-minimalis .amal-cta-box, .desain-minimalis .amal-stat-box { border-radius: 10px !important; border: 1px solid rgba(255,255,255,0.1) !important; }
  .tema-putih.desain-minimalis .amal-cta-box, .tema-abuterang.desain-minimalis .amal-cta-box,
  .tema-putih.desain-minimalis .amal-stat-box, .tema-abuterang.desain-minimalis .amal-stat-box { border-color: rgba(0,0,0,0.1) !important; }

  .footer { background: var(--gold); height: 64px; color: var(--bg-dark); display: flex; align-items: center; overflow: hidden; z-index: 100; transition: transform 0.8s; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
  .footer-label { background: var(--bg-dark); color: var(--gold); height: 100%; display: flex; align-items: center; padding: 0 24px; font-size: 28px; font-weight: 900; border-right: 5px solid var(--gold); flex-shrink: 0; }
  .marquee-text { display: inline-block; white-space: nowrap !important; font-size: 40px; font-weight: 800; padding-left: 100%; animation: marquee 40s linear infinite; line-height: 64px; }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

  #iqomah-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: opacity 0.5s; }
  #iqomah-screen.hide { opacity: 0; pointer-events: none; }
  .iq-title { font-size: 55px; font-weight: 700; letter-spacing: 3px; margin-bottom: 5px; }
  .iq-name { font-size: 110px; color: var(--gold); font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 20px; text-shadow: 0 0 45px var(--gold); }
  .iq-subtitle { font-size: 40px; margin-bottom: 10px; transition: color 0.3s; }
  .iq-timer { font-size: 280px; font-weight: 800; color: var(--masuk); font-family: 'Orbitron', sans-serif; line-height: 1; text-shadow: 0 0 60px var(--masuk); letter-spacing: 5px;}
  @keyframes blinkRed { 0%, 100% { color: #EF4444; text-shadow: 0 0 60px rgba(239,68,68,0.6); } 50% { color: #B91C1C; text-shadow: none; } }
  .iq-timer.warning { animation: blinkRed 1s infinite; }
</style>
</head>
<body>

  <div id="iqomah-screen" class="hide">
    <div class="iq-title" id="iq-header-title" style="color:var(--text)">WAKTU SHOLAT</div>
    <div class="iq-name" id="iq-name">SUBUH</div>
    <div class="iq-subtitle" id="iq-subtitle" style="color:var(--text)">Menuju Adzan</div>
    <div class="iq-timer" id="iq-timer">00:00</div>
  </div>

  <div id="loading-screen">
    <img src="Logo Power of Masjid.png" class="spinner-logo" onerror="this.src='https://via.placeholder.com/200?text=Power+Masjid'">
    <div style="font-size: 22px; color: var(--gold); margin-top: 25px; font-weight: bold; letter-spacing: 2px;">SINKRONISASI TV...</div>
  </div>

  <div class="header">
    <div class="logo-wrap" id="tv-logo-wrap"><div style="font-size:40px; color:var(--gold); font-family:'Amiri'">م</div></div>
    <div class="info-masjid"><div class="nama-masjid" id="tv-nama">...</div><div class="alamat-masjid" id="tv-alamat">...</div></div>
    <div class="header-right"><div class="jam-digital" id="jam">00:00:00</div><div class="tanggal-digital" id="tanggal">-</div></div>
  </div>

  <div class="sholat-bar" id="sholat-bar"></div>

  <div class="main">
    <div class="left-panel">
      <div class="card-saldo">
        <div class="saldo-title">SALDO KAS UMAT</div>
        <div class="saldo-value" id="tv-saldo">Rp 0</div>
      </div>
      
      <div class="card-info" id="panel-info">
        <div class="info-header">AGENDA MASJID RUTIN</div>
        <div class="info-body">
          <div class="agenda-scroll-wrapper"><div class="agenda-scroll-content" id="list-agenda-full"></div></div>
        </div>
      </div>
      
      <div id="panel-amal"></div>
    </div>

    <div class="right-panel" id="tv-right-panel">
      <div class="content-right active" id="konten-media"></div>
    </div>
  </div>

  <div class="footer" id="footer-info"><div class="footer-label">INFO</div><div style="flex:1; overflow:hidden;"><div class="marquee-text" id="tv-pengumuman"></div></div></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw48-aYX2jcRp5lT6cicKmpJ_xtAUKG19RwzFlir39pYVCUa7nYhaEP3w6688xUFpXt4g/exec';

let ID_MASJID = ''; let globalSholatList = []; let LIST_JADWAL = [];
let playlist = []; let playIndex = 0; let masterTimer;
let isIqomahMode = false; let iqomahTargetTime = null; let adzanTargetTime = null; 
let phase = "NORMAL"; 
let jedaConfig = { Subuh: 10, Dzuhur: 10, Ashar: 10, Maghrib: 10, Isya: 10 };
let koreksiJadwal = { Imsak: 0, Subuh: 0, Syuruq: 0, Dhuha: 0, Dzuhur: 0, Ashar: 0, Maghrib: 0, Isya: 0 };

let CURRENT_TEMA = '';
let CURRENT_DESAIN = 'desain-modern';

const MUTIARA_HIKMAH = [
  { judul: "Q.S. Al-Baqarah: 261", isi: "Perumpamaan orang yang menginfakkan hartanya di jalan Allah seperti sebutir biji yang menumbuhkan tujuh tangkai, pada setiap tangkai ada seratus biji." },

let showingAgenda = true;
let agendaItemIndex = 0;
let hikmahIndex = 0;

function escapeHtml(text) {
   return String(text || '').replace(/[&<>'"]/g, function(c) {
      return ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]);
   });
}

function hitungDurasiAgenda(k) {
   const teks = [k.nama_kegiatan, k.jadwal, k.lokasi, k.keterangan].filter(Boolean).join(' ');
   const panjang = teks.length;
   return Math.min(Math.max(6500, 5200 + (panjang * 42)), 11500);
}

function renderAgendaItem(panel) {
   if (!LIST_JADWAL.length) return 0;
   if (agendaItemIndex >= LIST_JADWAL.length) agendaItemIndex = 0;

   const k = LIST_JADWAL[agendaItemIndex];
   const nama = escapeHtml(k.nama_kegiatan);
   const jadwal = escapeHtml(k.jadwal);
   const lokasi = escapeHtml(k.lokasi);
   const ket = escapeHtml(k.keterangan);
   const meta = [jadwal, lokasi].filter(Boolean).join(' | ');
   const label = LIST_JADWAL.length > 1 ? `<div class="agenda-page-label">AGENDA ${agendaItemIndex + 1} / ${LIST_JADWAL.length}</div>` : '';
   const note = ket ? `<div class="agenda-note">${ket}</div>` : '';

   panel.innerHTML = `
      <div class="info-header">AGENDA MASJID RUTIN</div>
      <div class="info-body">
         <div class="agenda-scroll-wrapper">
            <div class="agenda-item agenda-single">
               <div class="agenda-judul">${nama}</div>
               <div class="agenda-meta">${meta}</div>
               ${note}
               ${label}
            </div>
         </div>
      </div>`;

   const durasi = hitungDurasiAgenda(k);
   agendaItemIndex++;
   return durasi;
}

function rotateInfoPanel() {
   const panel = document.getElementById('panel-info');
   if (!panel) return;
   clearTimeout(infoPanelTimer);

   let nextDelay = 22000;
   if (showingAgenda && LIST_JADWAL.length > 0) {
      nextDelay = renderAgendaItem(panel) || 8000;
      if (agendaItemIndex >= LIST_JADWAL.length) {

}

let audioCtx;
function initAudio() { if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if(audioCtx.state === 'suspended') { audioCtx.resume(); } }
document.body.addEventListener('click', initAudio, { once: true }); 

function playBeepPendek() {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
    gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function playBeepPanjang() {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
    gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3.0);
    osc.start(); osc.stop(audioCtx.currentTime + 3.0);
}

function getSlug() { const p = new URLSearchParams(window.location.search); return p.get('masjid') || 'annuriyah-tanjungbarat'; }

function matenginLink(url) {
  if (!url) return ''; 
  if (url.includes('youtube.com') || url.includes('youtu.be')) return url;
  let id = ''; const match = url.match(/(?:id=|v=|\/d\/|uc\?id=)([\w-]+)/);
  if (match) id = match[1]; return id ? 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1920' : url;
}

function ambilYoutubeId(url) {
  url = String(url || '').trim();
  let match = url.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/i);
  if (match) return match[1];
  match = url.match(/youtube\.com\/shorts\/([A-Za-z0-9_-]{6,})/i);
  if (match) return match[1];
  match = url.match(/youtube\.com\/live\/([A-Za-z0-9_-]{6,})/i);
  if (match) return match[1];
  match = url.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/i);
  if (match) return match[1];
  match = url.match(/[?&]v=([A-Za-z0-9_-]{6,})/i);
  if (match) return match[1];
  return '';
}

function getYoutubeEmbed(url) {
  const vidId = ambilYoutubeId(url);
  return vidId ? `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&controls=0&rel=0&playsinline=1` : '';
}

function updateTime() {
  const n = new Date(); 
  document.getElementById('jam').innerText = n.toLocaleTimeString('id-ID', {hour12: false});
  const o = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }; 
  document.getElementById('tanggal').innerText = n.toLocaleDateString('id-ID', o);
  
  if (phase === "NORMAL" && globalSholatList.length > 0) {
    const curTimeMs = n.getHours()*3600 + n.getMinutes()*60 + n.getSeconds();
    let sholatMendatang = null; let sisaKeAdzan = 0;

    for (let i=0; i<globalSholatList.length; i++) {
        let s = globalSholatList[i];
        if (['Subuh', 'Dzuhur', 'Ashar', 'Maghrib', 'Isya'].includes(s.n)) {
            let [h, m] = s.t.split(':').map(Number);
            let sholatTimeMs = h*3600 + m*60;
            let diff = sholatTimeMs - curTimeMs;
            if (diff > 0 && diff <= 5) { sholatMendatang = s; sisaKeAdzan = diff; break; }
        }
    }

    if (sholatMendatang) {
      phase = "PRA_ADZAN"; isIqomahMode = true;
      document.getElementById('iqomah-screen').classList.remove('hide');
      document.getElementById('iq-header-title').innerText = "WAKTU SHOLAT";
      document.getElementById('iq-name').innerText = sholatMendatang.n;
      document.getElementById('iq-subtitle').innerText = "MENUJU ADZAN";
      document.getElementById('iq-timer').innerText = sisaKeAdzan;
      document.getElementById('iq-timer').classList.remove('warning');
      document.getElementById('iq-timer').style.color = "var(--text)";
      adzanTargetTime = new Date(n.getTime() + (sisaKeAdzan * 1000));
    }
  }

  if (isIqomahMode) {
      if (phase === "PRA_ADZAN") {
          let diffMs = adzanTargetTime.getTime() - n.getTime();
          if (diffMs <= 0) {
              phase = "ADZAN";
              let namaSholat = document.getElementById('iq-name').innerText;
              
              if (n.getDay() === 5 && namaSholat === "Dzuhur") {
                  document.getElementById('iq-name').innerText = "JUM'AT";
                  document.getElementById('iq-subtitle').innerText = "Mendengarkan Khutbah...";
                  document.getElementById('iq-timer').style.display = 'none';
                  setTimeout(() => { 
                      isIqomahMode = false; phase = "NORMAL";
                      document.getElementById('iqomah-screen').classList.add('hide');
                      document.getElementById('iq-timer').style.display = 'block';
                  }, 45 * 60000); 
              } else {
                  document.getElementById('iq-subtitle').innerText = "WAKTU ADZAN";
                  document.getElementById('iq-subtitle').style.color = "var(--gold)";
                  document.getElementById('iq-timer').style.display = 'none';
                  
                  setTimeout(() => {
                      phase = "PRA_IQOMAH";
                      document.getElementById('iq-subtitle').innerText = "MENUJU IQOMAH";
                      document.getElementById('iq-subtitle').style.color = "var(--text)";
                      document.getElementById('iq-timer').style.display = 'block';
                      document.getElementById('iq-timer').style.color = "var(--masuk)";
                      let jedaMenit = jedaConfig[namaSholat] || 10;
                      let sisaIqomah = jedaMenit - 4; if (sisaIqomah < 1) sisaIqomah = 1; 
                      iqomahTargetTime = new Date(Date.now() + (sisaIqomah * 60000));
                  }, 4 * 60000); 
              }
          } else {
              document.getElementById('iq-timer').innerText = Math.ceil(diffMs / 1000);
          }
      } 
      else if (phase === "PRA_IQOMAH") {
          let diffMs = iqomahTargetTime.getTime() - n.getTime();
          if (diffMs <= 0) {
              phase = "IQOMAH";
              initAudio(); playBeepPanjang();
              document.getElementById('iq-subtitle').innerText = "LURUSKAN DAN RAPATKAN SHAF";
              document.getElementById('iq-timer').innerText = "00:00";
              document.getElementById('iq-timer').classList.add('warning'); 
              setTimeout(() => { 
                  isIqomahMode = false; phase = "NORMAL";
                  document.getElementById('iqomah-screen').classList.add('hide');
                  document.getElementById('iq-timer').classList.remove('warning');
                  document.getElementById('iq-timer').style.color = "var(--masuk)"; 
              }, 15 * 60000); 
          } else {
              let diffSec = Math.ceil(diffMs / 1000);
              let m = Math.floor(diffSec / 60); let s = diffSec % 60;
              document.getElementById('iq-timer').innerText = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
              if (diffSec <= 10 && diffSec > 0) {
                  initAudio(); playBeepPendek();
                  document.getElementById('iq-timer').style.color = "#F59E0B"; 
              }
          }
      }
  }
}

function aturRunningInfo(teks) {
  const footer = document.getElementById('footer-info');
  const pengumumanEl = document.getElementById('tv-pengumuman');
  teks = String(teks || '').trim();

  pengumumanEl.onanimationend = null;
  pengumumanEl.style.animation = 'none';

  if (!teks) {
    pengumumanEl.innerText = '';
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'flex';
  pengumumanEl.innerText = teks;

  const durasi = Math.min(Math.max(55, teks.length * 0.32), 150);

  function mulaiJalan() {
    footer.style.display = 'flex';
    pengumumanEl.style.animation = 'none';
    void pengumumanEl.offsetWidth;
    pengumumanEl.style.animation = `marquee ${durasi}s linear 1`;
  }

  pengumumanEl.onanimationend = function() {
    footer.style.display = 'none';
    setTimeout(mulaiJalan, 30000);
  };

  mulaiJalan();
}

    const [resS, resP, resG, resA, resK, resSpoTV] = await Promise.all([
      fetch(API_URL + '?action=getSaldo&id_masjid=' + ID_MASJID + '&_t=' + Date.now()).then(r => r.json()),
      fetch(API_URL + '?action=getPengumuman&id_masjid=' + ID_MASJID + '&_t=' + Date.now()).then(r => r.json()),
      fetch(API_URL + '?action=getGaleri&id_masjid=' + ID_MASJID + '&_t=' + Date.now()).then(r => r.json()),
      fetch(API_URL + '?action=getProgramAmal&id_masjid=' + ID_MASJID + '&_t=' + Date.now()).then(r => r.json()),
      fetch(API_URL + '?action=getJadwal&id_masjid=' + ID_MASJID + '&_t=' + Date.now()).then(r => r.json()),
      fetch(API_URL + '?action=getSponsorTV&_t=' + Date.now()).then(r => r.json())
    ]);
    
    if(resS.status === 'ok') {
        let saldoStr = Number(resS.data.saldo).toLocaleString("id-ID");
        document.getElementById('tv-saldo').innerText = "Rp " + saldoStr;
        if(saldoStr.length > 10) document.getElementById('tv-saldo').style.fontSize = "55px";
    }

    if(resK.status === 'ok') {
        LIST_JADWAL = resK.data;
        clearTimeout(infoPanelTimer);
        showingAgenda = LIST_JADWAL.length > 0;
        agendaItemIndex = 0;
        rotateInfoPanel(); 
    }

    let rawPlaylist = [];
    
    if(resA.status === 'ok') {
        let detailPromises = resA.data.map(p => {
            let act = p.tipe==='KURBAN' ? 'getKurban' : (p.tipe==='ZAKAT' ? 'getZakat' : 'getInfaq');
            return fetch(API_URL + '?action=' + act + '&id_masjid=' + ID_MASJID + '&id_program=' + p.id + '&_t=' + Date.now()).then(r => r.json());
        });
        let details = await Promise.all(detailPromises);
        for(let i=0; i<resA.data.length; i++) {
            resA.data[i].partisipan = (details[i].status === 'ok') ? details[i].data : [];
            rawPlaylist.push({ type: 'AMAL', data: resA.data[i] });
        }
    }

    if(resG.status === 'ok') {
        resG.data.forEach(g => rawPlaylist.push({ type: 'MEDIA', data: g }));
    }

    if(resSpoTV && resSpoTV.status === 'ok' && resSpoTV.data.length > 0) {
        resSpoTV.data.forEach(spo => {
            rawPlaylist.push({ type: 'MEDIA', data: { url: spo.url, judul: spo.nama, tipe: 'FLYER' } });
        });
    }
    
    let fullItems = []; let normItems = [];
    rawPlaylist.forEach(item => {
        if (item.type === 'AMAL') { fullItems.push(item); } 
        else if (item.type === 'MEDIA') {
            let m = item.data; let isLive = m.url.toLowerCase().includes('live'); let tipeVisual = String(m.tipe).toUpperCase();
            if (isLive || tipeVisual.includes('FLYER') || tipeVisual.includes('POSTER') || tipeVisual.includes('BROSUR')) { fullItems.push(item); } 
            else { normItems.push(item); }
        }
    });

    let interleavedPlaylist = []; 
    const maxLen = Math.max(normItems.length, fullItems.length, 1);

    for (let i = 0; i < maxLen; i++) {
        interleavedPlaylist.push({ type: 'DEFAULT' });
        if (normItems[i]) interleavedPlaylist.push(normItems[i]);
        if (fullItems[i]) interleavedPlaylist.push(fullItems[i]);
    }
    
    playlist = interleavedPlaylist;

    let gabunganPengumuman = "";
    if(resP.status === 'ok' && Array.isArray(resP.data) && resP.data.length > 0) {
      gabunganPengumuman = resP.data.map(p => `✦ ${p.judul}: ${(p.isi || "").replace(/(\r\n|\n|\r)/gm, " ")}`).join('   ✦   ');
    }
    
    aturRunningInfo(gabunganPengumuman);

    document.getElementById('loading-screen').classList.add('hide');
    
    if(!masterTimer) {
        document.body.className = `${CURRENT_TEMA} ${CURRENT_DESAIN}`; 
        document.getElementById('konten-media').innerHTML = `<div style="text-align:center; color:var(--text); opacity:0.3;"><img src="Logo Power of Masjid.png" style="width:200px;"><div style="font-size:30px; font-weight:800; margin-top:20px;">POWER OF MASJID</div></div>`;
        document.getElementById('konten-media').classList.add('active');
        
        masterTimer = setTimeout(jalankanTV, 30000); 
    }

  } catch(e) { console.log(e); }
}

async function calcSholat(lat, lon) {
  if(!lat || !lon) return;
  var d = new Date();
  var url = `https://api.aladhan.com/v1/timings/${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}?latitude=${lat}&longitude=${lon}&method=3`;
  try {
    var res = await fetch(url); var j = await res.json();
    if(j.code === 200) {
      var t = j.data.timings;
      function sesuaikanWaktu(timeStr, koreksiMenit = 0, tambahLagi = 0) {
         let bersih = String(timeStr || '').split(' ')[0];
         let [h, m] = bersih.split(':').map(Number);
         if (isNaN(h) || isNaN(m)) return '--:--';
         m += (Number(koreksiMenit || 0) + Number(tambahLagi || 0));
         h += Math.floor(m / 60); m = ((m % 60) + 60) % 60; h = ((h % 24) + 24) % 24;
         return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      }

      globalSholatList = [
        {n:'Imsak', t:sesuaikanWaktu(t.Imsak, koreksiJadwal.Imsak)},
        {n:'Subuh', t:sesuaikanWaktu(t.Fajr, koreksiJadwal.Subuh)},
        {n:'Syuruq', t:sesuaikanWaktu(t.Sunrise, koreksiJadwal.Syuruq)},
        {n:'Dhuha', t:sesuaikanWaktu(t.Sunrise, koreksiJadwal.Dhuha, 20)},
        {n:'Dzuhur', t:sesuaikanWaktu(t.Dhuhr, koreksiJadwal.Dzuhur)},
        {n:'Ashar', t:sesuaikanWaktu(t.Asr, koreksiJadwal.Ashar)},
        {n:'Maghrib', t:sesuaikanWaktu(t.Maghrib, koreksiJadwal.Maghrib)},
        {n:'Isya', t:sesuaikanWaktu(t.Isha, koreksiJadwal.Isya)}
      ];
      
      const now = d.getHours()*60 + d.getMinutes(); let cur = -1;
      for(let i=0; i<globalSholatList.length; i++){ let p=globalSholatList[i].t.split(':'); if(now <= parseInt(p[0])*60 + parseInt(p[1])){ cur=i; break; } }
      if(cur===-1) cur=0;
      
      document.getElementById('sholat-bar').innerHTML = globalSholatList.map((s,i) => `<div class="sholat-box ${i===cur?'aktif':''}"><div class="sholat-name">${s.n}</div><div class="sholat-time">${s.t}</div></div>`).join('');
    }
  } catch(e) { console.log("Gagal sinkron sholat"); }
}
