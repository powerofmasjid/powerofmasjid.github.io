<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Display — Power of Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #051A0F;
    --panel-bg: #0A2F1C;
    --gold: #C9A84C;
    --text: #E8F5EE;
    --masuk: #4ADE80;
    --keluar: #F87171;
  }
  
  /* DAFTAR TEMA OTOMATIS */
  .tema-safir{--bg-dark:#050F1A;--panel-bg:#0F2240;--gold:#4C7AC9;}
  .tema-emas{--bg-dark:#1A1405;--panel-bg:#4A3810;--gold:#C9A84C;}
  .tema-fajar{--bg-dark:#1A0F05;--panel-bg:#7C3D00;--gold:#F59E0B;}
  .tema-langit{--bg-dark:#05141A;--panel-bg:#014F86;--gold:#38BDF8;}
  .tema-tembaga{--bg-dark:#1A0505;--panel-bg:#4E1A0A;--gold:#C2410C;}
  .tema-perak{--bg-dark:#111827;--panel-bg:#1F2937;--gold:#9CA3AF;}
  .tema-merahhati{--bg-dark:#1A050A;--panel-bg:#4C0519;--gold:#E11D48;}
  .tema-toska{--bg-dark:#051A18;--panel-bg:#094A46;--gold:#14B8A6;}
  .tema-malam{--bg-dark:#050A1A;--panel-bg:#0F1F35;--gold:#3B82F6;}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: background 0.5s ease; }
  
  /* LOADING SCREEN OVERLAY */
  #loading-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
  #loading-screen.hide { opacity: 0; pointer-events: none; }
  .spinner-logo { font-family: 'Amiri', serif; font-size: 80px; color: var(--gold); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

  /* HEADER */
  .header { background: var(--panel-bg); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; transition: background 0.5s ease; }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo { font-family: 'Amiri', serif; font-size: 50px; color: var(--gold); line-height: 1; }
  .nama-masjid { font-size: 38px; font-weight: 700; color: white; letter-spacing: 1px; }
  .alamat-masjid { font-size: 18px; color: var(--gold); opacity: 0.8; margin-top: 5px; }
  
  .header-right { text-align: right; }
  .jam-digital { font-size: 50px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; letter-spacing: 2px; }
  .tanggal-digital { font-size: 20px; color: white; margin-top: 5px; }

  /* MAIN CONTENT */
  .main { flex: 1; display: flex; padding: 30px; gap: 30px; }
  
  .left-panel { flex: 4; display: flex; flex-direction: column; gap: 30px; }
  .card { background: var(--panel-bg); border-radius: 20px; border: 1px solid rgba(201,168,76,0.2); padding: 30px; display: flex; flex-direction: column; transition: background 0.5s ease; }
  .card-title { font-size: 24px; font-weight: 600; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
  .card-title::before { content: ''; display: inline-block; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; }
  
  .saldo-box { text-align: center; padding: 20px 0; }
  .saldo-value { font-family: 'Amiri', serif; font-size: 80px; font-weight: 700; color: var(--masuk); line-height: 1; text-shadow: 0 4px 20px rgba(74,222,128,0.2); }
  
  .trx-list { flex: 1; display: flex; flex-direction: column; gap: 15px; }
  .trx-item { background: rgba(0,0,0,0.3); padding: 20px 25px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid; font-size: 22px; }
  .trx-item.masuk { border-color: var(--masuk); }
  .trx-item.keluar { border-color: var(--keluar); }
  .trx-jumlah { font-weight: 700; font-size: 26px; }
  .trx-jumlah.masuk { color: var(--masuk); }
  .trx-jumlah.keluar { color: var(--keluar); }

  .right-panel { flex: 5; background: black; border-radius: 20px; border: 1px solid rgba(201,168,76,0.2); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  .media-image { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s ease; }
  .media-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 50%); display: flex; align-items: flex-end; padding: 40px; }
  .media-title { font-size: 32px; font-weight: 700; color: white; }

  /* FOOTER */
  .footer { background: var(--gold); padding: 15px 0; color: var(--bg-dark); font-size: 24px; font-weight: 700; display: flex; align-items: center; transition: background 0.5s ease; }
  .footer-label { background: var(--bg-dark); color: var(--gold); padding: 15px 30px; z-index: 2; font-size: 22px; transition: background 0.5s ease, color 0.5s ease; }
  .marquee-container { flex: 1; overflow: hidden; white-space: nowrap; }
  .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 35s linear infinite; }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
</style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner-logo">م</div>
    <div style="font-size: 20px; color: var(--gold); margin-top: 15px; letter-spacing: 2px;">MENGHUBUNGKAN KE SERVER...</div>
  </div>

  <div class="header">
    <div class="header-left">
      <div class="logo">م</div>
      <div>
        <div class="nama-masjid" id="tv-nama">Memuat...</div>
        <div class="alamat-masjid" id="tv-alamat">Harap tunggu, sinkronisasi data...</div>
      </div>
    </div>
    <div class="header-right">
      <div class="jam-digital" id="jam">00:00:00</div>
      <div class="tanggal-digital" id="tanggal">-</div>
    </div>
  </div>

  <div class="main">
    <div class="left-panel">
      <div class="card" style="flex: 0.5;">
        <div class="card-title">Saldo Kas Umat</div>
        <div class="saldo-box"><div class="saldo-value" id="tv-saldo">Rp 0</div></div>
      </div>
      <div class="card" style="flex: 1;">
        <div class="card-title">Transaksi Terakhir</div>
        <div class="trx-list" id="tv-trx"></div>
      </div>
    </div>
    <div class="right-panel" id="tv-media">
      <img src="" class="media-image" id="slide-img">
      <div class="media-overlay"><div class="media-title" id="slide-title">Selamat Datang</div></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-label">INFO MASJID</div>
    <div class="marquee-container"><div class="marquee-text" id="tv-pengumuman">Memuat pengumuman terbaru...</div></div>
  </div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxAFoiDYZBYIOzPXitZcSEKsRqDAqF6xP0um_E3uqy-vwTOaM5VQQaHr7xWTKrDmd95Pg/exec';
let ID_MASJID = '';
let galeriList = [];
let slideIndex = 0;

// FITUR ANTI-SLEEP (WAKE LOCK API)
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Layar TV dikunci menyala (Anti-Sleep Aktif)');
    }
  } catch (err) { console.log('Wake Lock Error:', err); }
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('masjid') || 'annuriyah-tanjungbarat';
}

function updateJam() {
  const now = new Date();
  document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
  const hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][now.getDay()];
  const bln = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][now.getMonth()];
  document.getElementById('tanggal').innerText = `${hari}, ${now.getDate()} ${bln} ${now.getFullYear()}`;
}
setInterval(updateJam, 1000);

async function loadDataTV() {
  try {
    const resM = await fetch(API_URL + '?action=getMasjidBySlug&slug=' + getSlug());
    const jM = await resM.json();
    if(jM.status === 'ok') {
      ID_MASJID = jM.data.id_masjid;
      document.getElementById('tv-nama').innerText = jM.data.nama;
      document.getElementById('tv-alamat').innerText = jM.data.alamat + ', ' + jM.data.kota;
      
      if(jM.data.tema) {
        document.body.className = ''; 
        document.body.classList.add('tema-' + jM.data.tema);
      }
    }

    // Ambil data Saldo, Transaksi, Pengumuman, Galeri secara bersamaan (Promise.all) biar lebih cepat
    const [resSaldo, resTrx, resPeng, resGal] = await Promise.all([
      fetch(API_URL + '?action=getSaldo&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getTransaksi&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getPengumuman&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getGaleri&id_masjid=' + ID_MASJID).then(r => r.json())
    ]);

    // 1. SALDO
    if(resSaldo.status === 'ok') document.getElementById('tv-saldo').innerText = "Rp " + Number(resSaldo.data.saldo).toLocaleString("id-ID");

    // 2. TRANSAKSI (Maks 4)
    if(resTrx.status === 'ok') {
      document.getElementById('tv-trx').innerHTML = resTrx.data.slice(0,4).map(t => `
        <div class="trx-item ${t.jenis}">
          <div><div class="trx-keterangan">${t.keterangan}</div></div>
          <div class="trx-jumlah ${t.jenis}">${t.jenis==='masuk'?'+':'-'} Rp ${Number(t.jumlah).toLocaleString("id-ID")}</div>
        </div>`).join('');
    }

    // 3. PENGUMUMAN (Dibatasi 5 Terbaru agar tidak jadi "Kereta Api")
    if(resPeng.status === 'ok' && resPeng.data.length > 0) {
      document.getElementById('tv-pengumuman').innerText = resPeng.data.slice(0,5).map(p => `✦ ${p.judul}: ${p.isi}`).join(' ✦ ');
    } else {
      document.getElementById('tv-pengumuman').innerText = "Selamat datang di masjid kami. Mari luruskan dan rapatkan shaf sebelum sholat dimulai.";
    }

    // 4. GALERI (Dengan Fallback Gambar Default jika kosong)
    if(resGal.status === 'ok') {
      galeriList = resGal.data.filter(g => g.tipe === 'FOTO');
      
      if(galeriList.length === 0) {
        // Fallback default image jika belum upload
        document.getElementById('slide-img').src = 'https://images.unsplash.com/photo-1564683214964-b38466e319bf?auto=format&fit=crop&w=1920&q=80';
        document.getElementById('slide-title').innerText = 'Selamat Datang';
        document.getElementById('slide-img').style.opacity = 0.8;
      } else {
        playSlideshow(); // Mulai slideshow jika ada foto
      }
    }

    // Hilangkan loading screen setelah semua sukses dimuat
    document.getElementById('loading-screen').classList.add('hide');

  } catch (error) {
    console.log("Menunggu koneksi internet...");
  }
}

function playSlideshow() {
  if(galeriList.length === 0) return;
  const imgEl = document.getElementById('slide-img');
  const titleEl = document.getElementById('slide-title');
  
  imgEl.style.opacity = 0;
  setTimeout(() => {
    let url = galeriList[slideIndex].url;
    if(url.includes('id=')) url = 'https://drive.google.com/thumbnail?id=' + url.split('id=')[1].split('&')[0] + '&sz=w1920';
    imgEl.src = url;
    titleEl.innerText = galeriList[slideIndex].judul;
    imgEl.style.opacity = 0.8;
    
    slideIndex = (slideIndex + 1) % galeriList.length;
  }, 1000);
}

// Interval Slideshow 10 detik
setInterval(() => { if(galeriList.length > 0) playSlideshow(); }, 10000);

// Auto Refresh TV Data tiap 5 Menit
setInterval(loadDataTV, 300000);

// Eksekusi awal
loadDataTV();
</script>
</body>
</html>
