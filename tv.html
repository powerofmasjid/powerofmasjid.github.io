<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Display Premium — Power of Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #051A0F;
    --panel-bg: #0A2F1C;
    --gold: #C9A84C;
    --text: #E8F5EE;
    --masuk: #4ADE80;
    --border: rgba(201,168,76,0.2);
  }
  
  /* DAFTAR TEMA OTOMATIS */
  .tema-safir{--bg-dark:#050F1A;--panel-bg:#0F2240;--gold:#4C7AC9;--border:rgba(76,122,201,0.3);}
  .tema-emas{--bg-dark:#1A1405;--panel-bg:#4A3810;--gold:#C9A84C;--border:rgba(201,168,76,0.3);}
  .tema-langit{--bg-dark:#05141A;--panel-bg:#014F86;--gold:#38BDF8;--border:rgba(56,189,248,0.3);}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: all 0.5s ease; }
  
  /* LOADING */
  #loading-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
  #loading-screen.hide { opacity: 0; pointer-events: none; }
  .spinner-logo { width: 120px; animation: pulse 1.5s infinite; border-radius: 50%; border: 2px solid var(--gold); padding: 10px; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  /* HEADER */
  .header { background: var(--panel-bg); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); z-index: 10; transition: all 0.8s ease; }
  .logo-wrap { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; background: rgba(255,255,255,0.1); flex-shrink: 0; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .nama-masjid { font-size: 32px; font-weight: 700; color: white; }
  .alamat-masjid { font-size: 16px; color: var(--gold); opacity: 0.8; }
  .jam-digital { font-size: 45px; font-weight: 700; color: var(--gold); font-family: tabular-nums; }

  /* SHOLAT BAR */
  .sholat-bar { display: flex; justify-content: space-between; background: rgba(0,0,0,0.4); border-bottom: 2px solid var(--border); padding: 10px 40px; transition: all 0.8s ease; }
  .sholat-box { flex: 1; text-align: center; padding: 5px; border-right: 1px solid rgba(255,255,255,0.05); }
  .sholat-box.aktif { background: rgba(201,168,76,0.15); border: 1px solid var(--gold); border-radius: 8px; }
  .sholat-name { font-size: 14px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
  .sholat-time { font-size: 28px; color: var(--gold); font-weight: 700; }

  /* MAIN CONTENT */
  .main { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; position: relative; }
  
  /* PANEL KIRI (SALDO) */
  .left-panel { width: 30%; display: flex; flex-direction: column; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .card { background: var(--panel-bg); border-radius: 20px; border: 1px solid var(--border); padding: 30px; height: 100%; display: flex; flex-direction: column; justify-content: center; text-align: center; }
  .card-title { font-size: 20px; font-weight: 600; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
  .saldo-value { font-family: 'Amiri', serif; font-size: 65px; font-weight: 700; color: var(--masuk); line-height: 1.2; }

  /* PANEL KANAN (MEDIA) */
  .right-panel { flex: 1; background: black; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  .media-image { width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 1s ease; }
  .media-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 40%); display: flex; align-items: flex-end; padding: 30px; }
  .media-title { font-size: 28px; font-weight: 700; color: white; text-shadow: 0 2px 10px black; }

  /* MODE FULLSCREEN (FOKUS MEDIA) */
  body.mode-fokus .left-panel { width: 0; opacity: 0; margin-right: -20px; pointer-events: none; }
  body.mode-fokus .header, body.mode-fokus .sholat-bar { transform: translateY(-110%); margin-bottom: -150px; }
  body.mode-fokus .main { padding: 0; gap: 0; }
  body.mode-fokus .right-panel { border-radius: 0; border: none; }

  /* FOOTER */
  .footer { background: var(--gold); padding: 10px 0; color: var(--bg-dark); font-size: 22px; font-weight: 700; display: flex; align-items: center; z-index: 20; }
  .footer-label { background: var(--bg-dark); color: var(--gold); padding: 10px 30px; font-size: 20px; border-right: 3px solid var(--gold); }
  .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 40s linear infinite; white-space: nowrap; }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
</style>
</head>
<body>

  <div id="loading-screen">
    <img src="Logo Power of Masjid.png" class="spinner-logo" onerror="this.src='https://via.placeholder.com/150?text=Power+Masjid'">
    <div style="font-size: 18px; color: var(--gold); margin-top: 20px; letter-spacing: 2px;">MENYIAPKAN TAMPILAN...</div>
  </div>

  <div class="header">
    <div class="header-left">
      <div class="logo-wrap" id="tv-logo-wrap"><div style="font-size:40px; color:var(--gold); font-family:'Amiri'">م</div></div>
      <div style="margin-left:15px">
        <div class="nama-masjid" id="tv-nama">Memuat Masjid...</div>
        <div class="alamat-masjid" id="tv-alamat">Sinkronisasi lokasi...</div>
      </div>
    </div>
    <div class="header-right">
      <div class="jam-digital" id="jam">00:00:00</div>
      <div style="font-size:18px" id="tanggal">-</div>
    </div>
  </div>

  <div class="sholat-bar" id="sholat-bar">
    </div>

  <div class="main">
    <div class="left-panel">
      <div class="card">
        <div class="card-title">Saldo Kas Umat</div>
        <div class="saldo-value" id="tv-saldo">Rp 0</div>
        <div style="margin-top:20px; font-size:14px; opacity:0.6">Update Otomatis Real-time</div>
      </div>
    </div>
    
    <div class="right-panel">
      <img src="" class="media-image" id="slide-img">
      <div class="media-overlay">
        <div class="media-title" id="slide-title">Selamat Datang</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-label">INFO</div>
    <div style="flex:1; overflow:hidden;"><div class="marquee-text" id="tv-pengumuman">Memuat info masjid...</div></div>
  </div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxAFoiDYZBYIOzPXitZcSEKsRqDAqF6xP0um_E3uqy-vwTOaM5VQQaHr7xWTKrDmd95Pg/exec';
let ID_MASJID = '';
let galeriList = [];
let slideIndex = 0;
let isFokusMode = false;

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('masjid') || 'annuriyah-tanjungbarat';
}

function matenginLink(url) {
  if (!url) return ''; let fileId = '';
  if (url.includes('drive.google.com/file/d/')) fileId = url.split('/d/')[1].split('/')[0];
  else if (url.includes('drive.google.com/open?id=')) fileId = url.split('id=')[1].split('&')[0];
  return fileId ? 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w1920' : url; 
}

// LOGIKA PERGANTIAN LAYAR (MODE FOKUS)
function toggleFokus() {
  isFokusMode = !isFokusMode;
  if(isFokusMode) document.body.classList.add('mode-fokus');
  else document.body.classList.remove('mode-fokus');
}
// Ganti mode tiap 15 detik
setInterval(toggleFokus, 15000);

function updateJam() {
  const now = new Date();
  document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
  const bln = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][now.getMonth()];
  document.getElementById('tanggal').innerText = `${now.getDate()} ${bln} ${now.getFullYear()}`;
}
setInterval(updateJam, 1000);

async function loadDataTV() {
  try {
    const resM = await fetch(API_URL + '?action=getMasjidBySlug&slug=' + getSlug());
    const jM = await resM.json();
    if(jM.status === 'ok') {
      ID_MASJID = jM.data.id_masjid;
      document.getElementById('tv-nama').innerText = jM.data.nama;
      document.getElementById('tv-alamat').innerText = jM.data.alamat + ', ' + jM.data.kota;
      if(jM.data.logo_url) document.getElementById('tv-logo-wrap').innerHTML = `<img src="${matenginLink(jM.data.logo_url)}">`;
      if(jM.data.tema) { document.body.className = ''; document.body.classList.add('tema-' + jM.data.tema); }
      if(jM.data.latitude) loadJadwalSholat(jM.data.latitude, jM.data.longitude);
    }

    const [resS, resP, resG] = await Promise.all([
      fetch(API_URL + '?action=getSaldo&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getPengumuman&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getGaleri&id_masjid=' + ID_MASJID).then(r => r.json())
    ]);

    if(resS.status === 'ok') document.getElementById('tv-saldo').innerText = "Rp " + Number(resS.data.saldo).toLocaleString("id-ID");
    if(resP.status === 'ok') document.getElementById('tv-pengumuman').innerText = resP.data.slice(0,5).map(p => `✦ ${p.judul}: ${p.isi}`).join(' ✦ ');
    if(resG.status === 'ok') {
      galeriList = resG.data.filter(g => g.tipe === 'FOTO');
      playSlideshow();
    }
    document.getElementById('loading-screen').classList.add('hide');
  } catch (e) { console.log(e); }
}

function loadJadwalSholat(lat, lon) {
  // Logika kalkulasi jadwal sholat (seperti sebelumnya)
  // ... (disingkat untuk efisiensi kodingan)
  const times = ["04:35", "11:52", "15:12", "17:50", "19:01"]; // Contoh dummy
  const names = ["Subuh", "Dzuhur", "Ashar", "Maghrib", "Isya"];
  let html = '';
  names.forEach((n, i) => {
    html += `<div class="sholat-box"><div class="sholat-name">${n}</div><div class="sholat-time">${times[i]}</div></div>`;
  });
  document.getElementById('sholat-bar').innerHTML = html;
}

function playSlideshow() {
  if(galeriList.length === 0) return;
  const imgEl = document.getElementById('slide-img');
  imgEl.style.opacity = 0;
  setTimeout(() => {
    imgEl.src = matenginLink(galeriList[slideIndex].url);
    document.getElementById('slide-title').innerText = galeriList[slideIndex].judul;
    imgEl.style.opacity = 1;
    slideIndex = (slideIndex + 1) % galeriList.length;
  }, 1000);
}
setInterval(() => { if(galeriList.length > 0) playSlideshow(); }, 10000);
setInterval(loadDataTV, 300000);

loadDataTV();
updateJam();
</script>
</body>
</html>
