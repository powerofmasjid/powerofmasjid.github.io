<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Display Power of Masjid — Fullscreen Amal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #051A0F;
    --panel-bg: #0A2F1C;
    --gold: #C9A84C;
    --text: #E8F5EE;
    --masuk: #4ADE80;
    --border: rgba(201,168,76,0.3);
  }
  
  .tema-safir{--bg-dark:#050F1A;--panel-bg:#0F2240;--gold:#4C7AC9;}
  .tema-emas{--bg-dark:#1A1405;--panel-bg:#4A3810;--gold:#C9A84C;}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: all 0.5s ease; }
  
  #loading-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #loading-screen.hide { display: none; }
  .spinner-logo { width: 180px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* HEADER */
  .header { background: var(--panel-bg); padding: 0 30px; height: 110px; display: flex; align-items: center; border-bottom: 4px solid var(--gold); z-index: 100; gap: 20px; flex-shrink: 0; transition: transform 0.8s, opacity 0.5s; }
  .logo-wrap { width: 85px; height: 85px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .info-masjid { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
  .nama-masjid { font-size: 34px; font-weight: 800; color: white; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alamat-masjid { font-size: 17px; color: var(--gold); opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-right { text-align: right; flex-shrink: 0; }
  .jam-digital { font-size: 48px; font-weight: 700; color: var(--gold); font-family: tabular-nums; line-height: 1; }
  .tanggal-digital { font-size: 18px; color: white; margin-top: 5px; }

  /* SHOLAT BAR */
  .sholat-bar { display: flex; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--border); height: 95px; align-items: center; padding: 0 5px; flex-shrink: 0; gap: 4px; transition: transform 0.8s, opacity 0.5s; }
  .sholat-box { flex: 1; text-align: center; padding: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
  .sholat-box.aktif { background: var(--gold); border: 2px solid white; transform: scale(1.05); box-shadow: 0 0 15px rgba(201,168,76,0.4); }
  .sholat-name { font-size: 13px; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
  .sholat-time { font-size: 34px; color: var(--gold); font-weight: 800; line-height: 1.1; }
  .sholat-box.aktif .sholat-name, .sholat-box.aktif .sholat-time { color: var(--bg-dark); }

  /* MAIN CONTENT */
  .main { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; position: relative; transition: all 0.8s; }
  
  /* PANEL KIRI */
  .left-panel { width: 34%; display: flex; flex-direction: column; position: relative; transition: width 0.8s, margin 0.8s, opacity 0.8s; }
  .card-left { position: absolute; inset: 0; transition: all 0.8s ease-in-out; background: var(--panel-bg); border-radius: 20px; border: 2px solid var(--border); padding: 30px; display: flex; flex-direction: column; justify-content: center; text-align: center; opacity: 1; transform: translateX(0); }
  .card-left.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }
  .saldo-value { font-family: 'Amiri', serif; font-size: 75px; font-weight: 700; color: var(--masuk); line-height: 1; margin-top: 10px; }

  /* PANEL KANAN */
  .right-panel { flex: 1; background: black; border-radius: 20px; border: 2px solid var(--border); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.8s ease-in-out; }
  .content-right { position: absolute; inset: 0; transition: opacity 1s; opacity: 0; display: flex; align-items: center; justify-content: center; }
  .content-right.active { opacity: 1; }
  .media-img { width: 100%; height: 100%; object-fit: contain; }
  .media-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 40%); display: flex; align-items: flex-end; padding: 30px; }
  .media-title { font-size: 32px; font-weight: 800; color: white; text-shadow: 0 3px 15px black; }

  .agenda-container { background: var(--panel-bg); width: 100%; height: 100%; padding: 40px; display: flex; flex-direction: column; text-align: left; overflow: hidden; }
  .agenda-header { border-bottom: 3px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; font-size: 36px; font-weight: 800; color: var(--gold); z-index: 10; background: var(--panel-bg); }
  .agenda-scroll-wrapper { flex: 1; overflow: hidden; position: relative; }
  .agenda-scroll-content { position: absolute; width: 100%; animation: scrollUp 25s linear infinite; }
  .agenda-item { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid var(--gold); }
  .agenda-judul { font-size: 28px; font-weight: 700; color: white; margin-bottom: 5px; }
  @keyframes scrollUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }

  /* FOOTER */
  .footer { background: var(--gold); height: 80px; color: var(--bg-dark); display: flex; align-items: center; overflow: hidden; z-index: 100; border-top: 4px solid var(--bg-dark); transition: transform 0.8s, opacity 0.5s; }
  .footer-label { background: var(--bg-dark); color: var(--gold); height: 100%; display: flex; align-items: center; padding: 0 35px; font-size: 28px; font-weight: 900; border-right: 5px solid var(--gold); flex-shrink: 0; }
  .marquee-text { display: inline-block; white-space: nowrap !important; font-size: 40px; font-weight: 800; padding-left: 100%; animation: marquee 40s linear infinite; line-height: 80px; }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

  /* =========================================================
     MODE FULLSCREEN SEJATI (AMAL & YOUTUBE LIVE) 
     ========================================================= */
  body.mode-amal .header, body.mode-amal .sholat-bar, body.mode-amal .footer { transform: translateY(150%); opacity: 0; position: absolute; pointer-events: none; }
  body.mode-amal .main { padding: 0; }
  body.mode-amal .right-panel { display: none; }
  body.mode-amal .left-panel { width: 100vw; height: 100vh; }
  body.mode-amal #panel-amal { border-radius: 0; border: none; background: var(--bg-dark); align-items: center; justify-content: center; }

  body.mode-live .header, body.mode-live .sholat-bar, body.mode-live .footer { transform: translateY(150%); opacity: 0; position: absolute; pointer-events: none; }
  body.mode-live .left-panel { display: none; }
  body.mode-live .main { padding: 0; }
  body.mode-live .right-panel { border-radius: 0; border: none; }

  /* --- LAYAR IQOMAH --- */
  #iqomah-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: opacity 1s; }
  #iqomah-screen.hide { opacity: 0; pointer-events: none; }
  .iq-title { font-size: 55px; color: white; font-weight: 700; letter-spacing: 3px; margin-bottom: 5px; }
  .iq-name { font-size: 110px; color: var(--gold); font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 20px; text-shadow: 0 5px 20px rgba(201,168,76,0.3); }
  .iq-subtitle { font-size: 40px; color: rgba(255,255,255,0.9); margin-bottom: 10px; }
  .iq-timer { font-size: 280px; font-weight: 800; color: var(--masuk); font-family: tabular-nums; line-height: 1; text-shadow: 0 10px 40px rgba(74,222,128,0.3); }
</style>
</head>
<body>

  <div id="iqomah-screen" class="hide">
    <div class="iq-title">WAKTU SHOLAT</div>
    <div class="iq-name" id="iq-name">SUBUH</div>
    <div class="iq-subtitle" id="iq-subtitle">Menuju Iqomah</div>
    <div class="iq-timer" id="iq-timer">00:00</div>
  </div>

  <div id="loading-screen">
    <img src="Logo Power of Masjid.png" class="spinner-logo" onerror="this.src='https://via.placeholder.com/200?text=Power+Masjid'">
    <div style="font-size: 22px; color: var(--gold); margin-top: 25px; font-weight: bold; letter-spacing: 2px;">SINKRONISASI TV...</div>
  </div>

  <div class="header">
    <div class="logo-wrap" id="tv-logo-wrap"><div style="font-size:40px; color:var(--gold); font-family:'Amiri'">م</div></div>
    <div class="info-masjid"><div class="nama-masjid" id="tv-nama">...</div><div class="alamat-masjid" id="tv-alamat">...</div></div>
    <div class="header-right"><div class="jam-digital" id="jam">00:00:00</div><div class="tanggal-digital" id="tanggal">-</div></div>
  </div>

  <div class="sholat-bar" id="sholat-bar"></div>

  <div class="main">
    <div class="left-panel">
      <div class="card-left" id="panel-saldo">
        <div style="font-size: 26px; font-weight: 800; color: var(--gold); margin-bottom: 5px;">SALDO KAS UMAT</div>
        <div class="saldo-value" id="tv-saldo">Rp 0</div>
      </div>
      
      <div class="card-left hidden" id="panel-amal">
        <div id="amal-judul" style="font-size: 60px; font-weight: 800; color: white; line-height: 1.2; text-transform: uppercase;">...</div>
        <div id="amal-nominal" style="font-size: 90px; font-weight: 800; color: var(--gold); margin-top: 25px; font-family: 'Amiri', serif;">Rp 0</div>
        <div id="amal-ket" style="font-size: 35px; font-weight: 600; color: white; margin-top: 35px; opacity: 0.9; white-space: pre-wrap; line-height: 1.4;"></div>
      </div>
    </div>

    <div class="right-panel" id="tv-right-panel">
      <div class="content-right active" id="konten-media"></div>
      <div class="content-right" id="konten-agenda">
        <div class="agenda-container">
          <div class="agenda-header">AGENDA MASJID RUTIN</div>
          <div class="agenda-scroll-wrapper"><div class="agenda-scroll-content" id="list-agenda-full"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer"><div class="footer-label">INFO</div><div style="flex:1; overflow:hidden;"><div class="marquee-text" id="tv-pengumuman"></div></div></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzr6Oyzyx91Tk2koE5qOu81udsisOYu9qdEKeS-n_em9JKLUDBqvooGjUjaKSMbbREC/exec';

let ID_MASJID = ''; let galeriList = []; let amalList = []; let kegiatanList = []; let globalSholatList = [];
let slideIndex = 0; let amalIndex = 0; let panelKiriState = 0; let modeKanan = 0;
let kananTimer;

let isIqomahMode = false;
let iqomahTargetTime = null;
let jedaConfig = { Subuh: 10, Dzuhur: 10, Ashar: 10, Maghrib: 10, Isya: 10 };

function getSlug() { const p = new URLSearchParams(window.location.search); return p.get('masjid') || 'annuriyah-tanjungbarat'; }

function matenginLink(url) {
  if (!url) return ''; 
  if (url.includes('youtube.com') || url.includes('youtu.be')) return url;
  let id = '';
  const match = url.match(/(?:id=|v=|\/d\/|uc\?id=)([\w-]+)/);
  if (match) id = match[1];
  return id ? 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1920' : url;
}

function getYoutubeEmbed(url) {
  let vidId = ''; 
  if(url.includes('youtu.be/')) vidId = url.split('youtu.be/')[1].split('?')[0]; 
  else if(url.includes('v=')) vidId = url.split('v=')[1].split('&')[0]; 
  else if(url.includes('live/')) vidId = url.split('live/')[1].split('?')[0];
  return vidId ? `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&controls=0&rel=0&loop=1&playlist=${vidId}` : '';
}

function updateTime() {
  const n = new Date(); 
  document.getElementById('jam').innerText = n.toLocaleTimeString('id-ID', {hour12: false});
  const o = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }; 
  document.getElementById('tanggal').innerText = n.toLocaleDateString('id-ID', o);
  
  if (!isIqomahMode && globalSholatList.length > 0) {
    const currentHM = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    if (n.getSeconds() === 0) {
      const sholat = globalSholatList.find(s => s.t === currentHM && ['Subuh', 'Dzuhur', 'Ashar', 'Maghrib', 'Isya'].includes(s.n));
      if (sholat) {
        isIqomahMode = true;
        document.getElementById('iqomah-screen').classList.remove('hide');
        
        if (n.getDay() === 5 && sholat.n === 'Dzuhur') {
          document.getElementById('iq-name').innerText = "JUM'AT";
          document.getElementById('iq-subtitle').innerText = "Mendengarkan Khutbah...";
          document.getElementById('iq-timer').style.display = 'none';
          setTimeout(() => { 
            isIqomahMode = false;
            document.getElementById('iqomah-screen').classList.add('hide');
            document.getElementById('iq-timer').style.display = 'block';
          }, 45 * 60000); 
        } else {
          document.getElementById('iq-name').innerText = sholat.n;
          document.getElementById('iq-subtitle').innerText = "Menuju Iqomah";
          let jedaMenit = jedaConfig[sholat.n] || 10;
          iqomahTargetTime = new Date(n.getTime() + (jedaMenit * 60000));
        }
      }
    }
  }

  if (isIqomahMode && iqomahTargetTime) {
    let diffMs = iqomahTargetTime.getTime() - n.getTime();
    if (diffMs <= 0) {
      document.getElementById('iq-subtitle').innerText = "LURUSKAN DAN RAPATKAN SHAF";
      document.getElementById('iq-timer').innerText = "00:00";
      document.getElementById('iq-timer').style.color = "red";
      iqomahTargetTime = null; 
      setTimeout(() => { 
        isIqomahMode = false;
        document.getElementById('iqomah-screen').classList.add('hide');
        document.getElementById('iq-timer').style.color = "var(--masuk)"; 
      }, 15 * 60000); 
    } else {
      let diffSec = Math.floor(diffMs / 1000);
      let m = Math.floor(diffSec / 60);
      let s = diffSec % 60;
      document.getElementById('iq-timer').innerText = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }
  }
}
setInterval(updateTime, 1000);

// ROTASI KIRI (SALDO -> AMAL FULLSCREEN)
setInterval(() => {
  const pSaldo = document.getElementById('panel-saldo'); const pAmal = document.getElementById('panel-amal');
  if (amalList.length === 0) { pAmal.classList.add('hidden'); pSaldo.classList.remove('hidden'); document.body.classList.remove('mode-amal'); return; }
  
  panelKiriState = (panelKiriState + 1) % 2;
  if (panelKiriState === 0) {
    document.body.classList.remove('mode-amal'); pAmal.classList.add('hidden'); pSaldo.classList.remove('hidden');
  } else {
    const a = amalList[amalIndex];
    // Tampilan Bersih (Langsung Judul)
    document.getElementById('amal-judul').innerText = a.judul || "Program Infaq";
    let nominal = a.harga_target || a.target || a.terkumpul || 0;
    document.getElementById('amal-nominal').innerText = "Rp " + Number(nominal).toLocaleString("id-ID");
    document.getElementById('amal-ket').innerText = a.keterangan || a.deskripsi || a.isi || "";
    
    document.body.classList.add('mode-amal'); pSaldo.classList.add('hidden'); pAmal.classList.remove('hidden');
    amalIndex = (amalIndex + 1) % amalList.length;
  }
}, 15000);

async function loadData() {
  try {
    const rM = await fetch(API_URL + '?action=getMasjidBySlug&slug=' + getSlug());
    const jM = await rM.json();
    if(jM.status === 'ok') {
      ID_MASJID = jM.data.id_masjid;
      document.getElementById('tv-nama').innerText = jM.data.nama;
      document.getElementById('tv-alamat').innerText = jM.data.alamat + ', ' + jM.data.kota;
      if(jM.data.logo_url) document.getElementById('tv-logo-wrap').innerHTML = `<img src="${matenginLink(jM.data.logo_url)}">`;
      if(jM.data.tema) { document.body.className = ''; document.body.classList.add('tema-' + jM.data.tema); }
      
      jedaConfig = {
        Subuh: parseInt(jM.data.jeda_subuh) || 10, Dzuhur: parseInt(jM.data.jeda_dzuhur) || 10,
        Ashar: parseInt(jM.data.jeda_ashar) || 10, Maghrib: parseInt(jM.data.jeda_maghrib) || 10,
        Isya: parseInt(jM.data.jeda_isya) || 10
      };
      if(jM.data.latitude) calcSholat(jM.data.latitude, jM.data.longitude);
    }
    const [resS, resP, resG, resA, resK] = await Promise.all([
      fetch(API_URL + '?action=getSaldo&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getPengumuman&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getGaleri&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getProgramAmal&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getJadwal&id_masjid=' + ID_MASJID).then(r => r.json())
    ]);
    
    if(resS.status === 'ok') document.getElementById('tv-saldo').innerText = "Rp " + Number(resS.data.saldo).toLocaleString("id-ID");
    
    // HAPUS DEFAULT "SELAMAT DATANG", HANYA TAMPILKAN JIKA ADA PENGUMUMAN AKTIF
    if(resP.status === 'ok' && Array.isArray(resP.data) && resP.data.length > 0) {
      let gabungan = resP.data.map(p => `✦ ${p.judul}: ${(p.isi || "").replace(/(\r\n|\n|\r)/gm, " ")}`).join(' ✦ ');
      document.getElementById('tv-pengumuman').innerText = gabungan;
    } else {
      document.getElementById('tv-pengumuman').innerText = ""; // Dikosongkan jika tidak ada
    }
    
    if(resG.status === 'ok') { galeriList = resG.data; if(!kananTimer) updateKanan(); }
    if(resA.status === 'ok') amalList = resA.data;
    if(resK.status === 'ok') {
      kegiatanList = resK.data;
      document.getElementById('list-agenda-full').innerHTML = kegiatanList.map(k => `<div class="agenda-item"><div class="agenda-judul">${k.nama_kegiatan}</div><div style="color:var(--gold); font-size:20px; font-weight:600;">${k.jadwal} | ${k.lokasi}</div></div>`).join('');
    }
    document.getElementById('loading-screen').classList.add('hide');
  } catch(e) { console.log(e); }
}

function updateKanan() {
  clearTimeout(kananTimer); let nextDelay = 15000; 
  const pMedia = document.getElementById('konten-media'); const pAgenda = document.getElementById('konten-agenda');

  if (modeKanan === 0) {
    if (galeriList.length === 0) { if(kegiatanList.length > 0) { modeKanan = 1; updateKanan(); } return; }
    const m = galeriList[slideIndex];
    let isYt = m.url.includes('youtube.com') || m.url.includes('youtu.be');
    let isLive = m.url.toLowerCase().includes('live');

    if (isLive) { document.body.classList.add('mode-live'); nextDelay = 3600000; } 
    else { document.body.classList.remove('mode-live'); if (isYt) nextDelay = 180000; else nextDelay = 15000; }

    if(isYt) pMedia.innerHTML = `<iframe class="media-img" src="${getYoutubeEmbed(m.url)}" allow="autoplay"></iframe>`;
    else pMedia.innerHTML = `<img class="media-img" src="${matenginLink(m.url)}"><div class="media-overlay"><div class="media-title">${m.judul}</div></div>`;

    pAgenda.classList.remove('active'); pMedia.classList.add('active');
    slideIndex++;
    if (slideIndex >= galeriList.length) { slideIndex = 0; if (kegiatanList.length > 0 && !isLive) modeKanan = 1; }
  } else {
    document.body.classList.remove('mode-live'); pMedia.classList.remove('active'); pAgenda.classList.add('active'); modeKanan = 0; nextDelay = 25000; 
  }
  kananTimer = setTimeout(updateKanan, nextDelay);
}

function calcSholat(lat, lon) {
  const D2R = Math.PI / 180; const R2D = 180 / Math.PI; const t = new Date();
  const Y = t.getFullYear(); const M = t.getMonth() + 1; const D = t.getDate();
  const JD = 367*Y - Math.floor(7*(Y+Math.floor((M+9)/12))/4) + Math.floor(275*M/9) + D + 1721013.5;
  const T = (JD - 2451545) / 36525;
  const L0 = (280.46646 + 36000.76983*T) % 360; const M0 = (357.52911 + 35999.05029*T) % 360;
  const C = (1.914602 - 0.004817*T)*Math.sin(M0*D2R) + 0.019993*Math.sin(2*M0*D2R);
  const sunLon = L0 + C; const obliq = 23.4393 - 0.0130*T;
  const decl = R2D * Math.asin(Math.sin(obliq*D2R) * Math.sin(sunLon*D2R));
  const EqT = (((L0 + C) - (R2D * Math.atan2(Math.cos(obliq*D2R)*Math.sin(sunLon*D2R), Math.cos(sunLon*D2R)))) % 360) / 15;
  const transit = 12 - lon/15 + 7 - EqT;
  const ha = (a) => R2D * Math.acos((Math.sin(a*D2R) - Math.sin(lat*D2R)*Math.sin(decl*D2R)) / (Math.cos(lat*D2R)*Math.cos(decl*D2R))) / 15;
  const fmt = (tm) => { tm = (tm+24)%24; let h = Math.floor(tm); let m = Math.round((tm-h)*60); if(m==60){h++;m=0;} return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); };
  
  const sub = transit - ha(-20); const ter = transit - ha(-0.833);
  const ims = sub - (10/60); const dhu = ter + (20/60); const dzu = transit; const mag = transit + ha(-0.833); const isy = transit + ha(-18);
  const asrA = R2D * Math.atan(1/(1 + Math.tan(D2R*Math.abs(lat - decl)))); const asr = transit + ha(asrA);
  
  globalSholatList = [{n:'Imsak', t:fmt(ims)}, {n:'Subuh', t:fmt(sub)}, {n:'Terbit', t:fmt(ter)}, {n:'Dhuha', t:fmt(dhu)}, {n:'Dzuhur', t:fmt(dzu)}, {n:'Ashar', t:fmt(asr)}, {n:'Maghrib', t:fmt(mag)}, {n:'Isya', t:fmt(isy)}];
  const now = t.getHours()*60 + t.getMinutes(); let cur = -1;
  for(let i=0; i<globalSholatList.length; i++){ let p=globalSholatList[i].t.split(':'); if(now <= parseInt(p[0])*60 + parseInt(p[1])){ cur=i; break; } }
  if(cur===-1) cur=0;
  
  document.getElementById('sholat-bar').innerHTML = globalSholatList.map((s,i) => `<div class="sholat-box ${i===cur?'aktif':''}"><div class="sholat-name">${s.n}</div><div class="sholat-time">${s.t}</div></div>`).join('');
}

loadData(); setInterval(loadData, 300000); 
</script>
