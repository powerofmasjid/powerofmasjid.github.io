<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Display Power of Masjid — Stabil Version</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #051A0F;
    --panel-bg: #0A2F1C;
    --gold: #C9A84C;
    --text: #E8F5EE;
    --masuk: #4ADE80;
    --border: rgba(201,168,76,0.3);
  }
  
  .tema-safir{--bg-dark:#050F1A;--panel-bg:#0F2240;--gold:#4C7AC9;}
  .tema-emas{--bg-dark:#1A1405;--panel-bg:#4A3810;--gold:#C9A84C;}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: var(--bg-dark); 
    color: var(--text); 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
    display: flex; 
    flex-direction: column; 
  }
  
  /* LOADING */
  #loading-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #loading-screen.hide { display: none; }
  .spinner-logo { width: 220px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* HEADER: Kunci Kiri-Kanan */
  .header { 
    background: var(--panel-bg); 
    padding: 0 30px; 
    height: 120px; 
    display: flex; 
    align-items: center; 
    border-bottom: 4px solid var(--gold); 
    z-index: 100; 
    gap: 25px; 
    flex-shrink: 0; 
  }
  .logo-wrap { width: 90px; height: 90px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 12px; }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .info-masjid { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
  .nama-masjid { font-size: 38px; font-weight: 800; color: white; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alamat-masjid { font-size: 20px; color: var(--gold); opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-right { text-align: right; flex-shrink: 0; }
  .jam-digital { font-size: 55px; font-weight: 700; color: var(--gold); font-family: tabular-nums; line-height: 1; }
  .tanggal-digital { font-size: 18px; color: white; margin-top: 5px; }

  /* SHOLAT BAR: 8 WAKTU */
  .sholat-bar { display: flex; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--border); height: 85px; align-items: center; padding: 0 10px; flex-shrink: 0; gap: 10px; }
  .sholat-box { flex: 1; text-align: center; padding: 10px 5px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.5s; }
  .sholat-box.aktif { background: var(--gold); border: 2px solid white; transform: scale(1.05); box-shadow: 0 0 15px rgba(201,168,76,0.5); }
  .sholat-name { font-size: 14px; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
  .sholat-box.aktif .sholat-name { color: var(--bg-dark); }
  .sholat-time { font-size: 26px; color: var(--gold); font-weight: 800; line-height: 1.2; }
  .sholat-box.aktif .sholat-time { color: var(--bg-dark); }

  /* MAIN CONTENT */
  .main { flex: 1; display: flex; padding: 25px; gap: 25px; overflow: hidden; position: relative; }
  .left-panel { width: 35%; display: flex; flex-direction: column; }
  .card { background: var(--panel-bg); border-radius: 25px; border: 2px solid var(--border); padding: 30px; height: 100%; display: flex; flex-direction: column; justify-content: center; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .card-title { font-size: 26px; font-weight: 700; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
  .saldo-value { font-family: 'Amiri', serif; font-size: 85px; font-weight: 700; color: var(--masuk); line-height: 1; text-shadow: 0 5px 15px rgba(74,222,128,0.2); }

  /* MEDIA PANEL: Selalu di samping Saldo */
  .right-panel { flex: 1; background: black; border-radius: 25px; border: 2px solid var(--border); overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .media-content { width: 100%; height: 100%; object-fit: contain; position: absolute; border: none; }
  .media-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 40%); display: flex; align-items: flex-end; padding: 40px; z-index: 5; }
  .media-title { font-size: 34px; font-weight: 800; color: white; text-shadow: 0 3px 10px rgba(0,0,0,0.8); }

  /* MODE LIVE STREAM (Khusus ini yang boleh membesar) */
  body.mode-live .left-panel, body.mode-live .header, body.mode-live .sholat-bar { display: none; }
  body.mode-live .main { padding: 0; }
  body.mode-live .right-panel { border-radius: 0; border: none; }

  /* FOOTER & RUNNING TEXT FIX: WAJIB 1 BARIS LURUS */
  .footer { 
    background: var(--gold); 
    height: 90px; 
    color: var(--bg-dark); 
    display: flex; 
    align-items: center; 
    overflow: hidden; 
    z-index: 1000; 
    flex-shrink: 0; 
    border-top: 4px solid var(--bg-dark);
  }
  .footer-label { 
    background: var(--bg-dark); 
    color: var(--gold); 
    height: 100%; 
    display: flex; 
    align-items: center; 
    padding: 0 45px; 
    font-size: 32px; 
    font-weight: 900; 
    border-right: 6px solid var(--gold); 
    flex-shrink: 0; 
    letter-spacing: 2px;
  }
  .marquee-container { flex: 1; overflow: hidden; display: flex; align-items: center; }
  .marquee-text { 
    display: inline-block; 
    white-space: nowrap !important; /* KUNCI: Tidak boleh melipat */
    font-size: 45px; 
    font-weight: 800; 
    padding-left: 100%; 
    animation: marquee 45s linear infinite; 
    line-height: 90px; 
  }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
</style>
</head>
<body>

  <div id="loading-screen">
    <img src="Logo Power of Masjid.png" class="spinner-logo" onerror="this.src='https://via.placeholder.com/220?text=Power+Masjid'">
    <div style="font-size: 24px; color: var(--gold); margin-top: 25px; font-weight: 800; letter-spacing: 3px;">SINKRONISASI TV...</div>
  </div>

  <div class="header">
    <div class="logo-wrap" id="tv-logo-wrap"><div style="font-size:50px; color:var(--gold); font-family:'Amiri'">م</div></div>
    <div class="info-masjid">
      <div class="nama-masjid" id="tv-nama">Memuat Masjid...</div>
      <div class="alamat-masjid" id="tv-alamat">Sinkronisasi data sistem...</div>
    </div>
    <div class="header-right">
      <div class="jam-digital" id="jam">00:00:00</div>
      <div class="tanggal-digital" id="tanggal">-</div>
    </div>
  </div>

  <div class="sholat-bar" id="sholat-bar"></div>

  <div class="main">
    <div class="left-panel">
      <div class="card">
        <div class="card-title">Saldo Kas Umat</div>
        <div class="saldo-value" id="tv-saldo">Rp 0</div>
      </div>
    </div>
    <div class="right-panel" id="tv-right-panel"></div>
  </div>

  <div class="footer">
    <div class="footer-label">INFO</div>
    <div class="marquee-container">
      <div class="marquee-text" id="tv-pengumuman">Memuat informasi terbaru dari masjid...</div>
    </div>
  </div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxAFoiDYZBYIOzPXitZcSEKsRqDAqF6xP0um_E3uqy-vwTOaM5VQQaHr7xWTKrDmd95Pg/exec';
let ID_MASJID = '';
let galeriList = [];
let slideIndex = 0;
let nextUpdateTimer;

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('masjid') || 'annuriyah-tanjungbarat';
}

function matenginLink(url) {
  if (!url) return '';
  if (url.includes('youtube.com') || url.includes('youtu.be')) return url;
  let fileId = '';
  if (url.includes('id=')) fileId = url.split('id=')[1].split('&')[0];
  else if (url.includes('/d/')) fileId = url.split('/d/')[1].split('/')[0];
  return fileId ? 'https://drive.google.com/uc?export=view&id=' + fileId : url;
}

function getYoutubeEmbed(url) {
  let vidId = '';
  if(url.includes('youtu.be/')) vidId = url.split('youtu.be/')[1].split('?')[0];
  else if(url.includes('v=')) vidId = url.split('v=')[1].split('&')[0];
  else if(url.includes('live/')) vidId = url.split('live/')[1].split('?')[0];
  return vidId ? `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&controls=0&rel=0` : '';
}

function updateTime() {
  const now = new Date();
  document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
  const opt = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', opt);
}
setInterval(updateTime, 1000);

async function loadData() {
  try {
    const resM = await fetch(API_URL + '?action=getMasjidBySlug&slug=' + getSlug());
    const jM = await resM.json();
    if(jM.status === 'ok') {
      ID_MASJID = jM.data.id_masjid;
      document.getElementById('tv-nama').innerText = jM.data.nama;
      document.getElementById('tv-alamat').innerText = jM.data.alamat + ', ' + jM.data.kota;
      if(jM.data.logo_url) document.getElementById('tv-logo-wrap').innerHTML = `<img src="${matenginLink(jM.data.logo_url)}">`;
      if(jM.data.tema) { document.body.className = ''; document.body.classList.add('tema-' + jM.data.tema); }
      if(jM.data.latitude) generateJadwal(jM.data.latitude, jM.data.longitude);
    }

    const [resS, resP, resG] = await Promise.all([
      fetch(API_URL + '?action=getSaldo&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getPengumuman&id_masjid=' + ID_MASJID).then(r => r.json()),
      fetch(API_URL + '?action=getGaleri&id_masjid=' + ID_MASJID).then(r => r.json())
    ]);

    if(resS.status === 'ok') document.getElementById('tv-saldo').innerText = "Rp " + Number(resS.data.saldo).toLocaleString("id-ID");
    
    // FIX PENGUMUMAN: SETRIKA SEMUA ENTER
    if(resP.status === 'ok') {
      let gabungan = resP.data.map(p => {
        let bersih = p.isi.replace(/(\r\n|\n|\r)/gm, " "); 
        return `✦ ${p.judul}: ${bersih}`;
      }).join(' ✦ ');
      document.getElementById('tv-pengumuman').innerText = gabungan;
    }
    
    if(resG.status === 'ok') {
      galeriList = resG.data;
      if (galeriList.length > 0 && !nextUpdateTimer) updateDisplay();
    }
    document.getElementById('loading-screen').classList.add('hide');
  } catch(e) { console.log(e); }
}

function updateDisplay() {
  clearTimeout(nextUpdateTimer);
  const container = document.getElementById('tv-right-panel');
  const media = galeriList[slideIndex];
  
  let isYoutube = media.url.includes('youtube.com') || media.url.includes('youtu.be');
  let isLive = media.url.includes('live');

  // RESET MODE FOKUS (Hanya LIVE yang boleh fullscreen)
  document.body.classList.remove('mode-live');

  if(isYoutube) {
    if(isLive) document.body.classList.add('mode-live');
    container.innerHTML = `<iframe class="media-content" src="${getYoutubeEmbed(media.url)}" allow="autoplay; fullscreen"></iframe>`;
  } else {
    container.innerHTML = `<img class="media-content" src="${matenginLink(media.url)}"><div class="media-overlay"><div class="media-title">${media.judul}</div></div>`;
  }

  slideIndex = (slideIndex + 1) % galeriList.length;
  let durasi = (isYoutube && !isLive) ? 180000 : (isLive ? 3600000 : 15000);
  nextUpdateTimer = setTimeout(updateDisplay, durasi);
}

function generateJadwal(lat, lon) {
  // Jadwal Sholat 8 Waktu (Simulasi)
  const times = ["04:10", "04:20", "05:45", "06:10", "11:55", "15:15", "18:05", "19:15"];
  const labels = ["Imsak", "Subuh", "Terbit", "Dhuha", "Dzuhur", "Ashar", "Maghrib", "Isya"];
  let html = '';
  labels.forEach((l, i) => { html += `<div class="sholat-box"><div class="sholat-name">${l}</div><div class="sholat-time">${times[i]}</div></div>`; });
  document.getElementById('sholat-bar').innerHTML = html;
}

loadData();
setInterval(loadData, 300000); 
</script>
</body>
</html>
