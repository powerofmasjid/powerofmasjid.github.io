<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power of Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{--primary:#1B6B3A;--primary-dark:#0F4228;--primary-light:#E8F5EE;--accent:#C9A84C;--accent-light:#FBF3E0;--bg:#F7F7F5;--white:#FFFFFF;--text:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--masuk:#1B6B3A;--keluar:#DC2626;}
.tema-safir{--primary:#1B3A6B;--primary-dark:#0F2240;--primary-light:#E8EEF5;--accent:#4C7AC9;}
.tema-emas{--primary:#7A5C1B;--primary-dark:#4A3810;--primary-light:#F5EFE8;--accent:#C9A84C;}
.tema-fajar{--primary:#B45309;--primary-dark:#7C3D00;--primary-light:#FEF3E8;--accent:#F59E0B;}
.tema-langit{--primary:#0369A1;--primary-dark:#014F86;--primary-light:#E8F4FB;--accent:#38BDF8;}
.tema-tembaga{--primary:#7C2D12;--primary-dark:#4E1A0A;--primary-light:#FEE8E8;--accent:#C2410C;}
.tema-perak{--primary:#374151;--primary-dark:#1F2937;--primary-light:#F3F4F6;--accent:#9CA3AF;}
.tema-merahhati{--primary:#881337;--primary-dark:#4C0519;--primary-light:#FFF1F2;--accent:#E11D48;}
.tema-toska{--primary:#0F766E;--primary-dark:#094A46;--primary-light:#E8FAF8;--accent:#14B8A6;}
.tema-malam{--primary:#1E3A5F;--primary-dark:#0F1F35;--primary-light:#E8EEF5;--accent:#3B82F6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);}

/* SPLASH */
.splash{position:fixed;inset:0;background:var(--primary-dark);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Amiri',serif;font-size:56px;color:var(--accent);margin-bottom:0.5rem;}
.splash-text{color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:2rem;}
.splash-bar{width:120px;height:3px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden;}
.splash-fill{height:100%;background:var(--accent);border-radius:3px;animation:load 1.5s ease forwards;}
@keyframes load{from{width:0}to{width:100%}}

/* HEADER */
.header{background:linear-gradient(160deg,var(--primary-dark) 0%,var(--primary) 100%);padding:2rem 1.25rem 3rem;text-align:center;position:relative;overflow:hidden;}
.logo-wrap{width:80px;height:80px;border-radius:50%;border:2px solid rgba(201,168,76,0.5);margin:0 auto 1rem;overflow:hidden;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.header h1{font-family:'Amiri',serif;font-size:22px;color:white;font-weight:700;line-height:1.3;position:relative;z-index:1;}
.header .alamat{font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px;position:relative;z-index:1;}
.badge-pow{display:inline-flex;align-items:center;gap:4px;background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.4);color:var(--accent);font-size:11px;padding:4px 10px;border-radius:20px;margin-top:10px;font-weight:500;}

/* JADWAL SHOLAT */
.sholat-card{background:var(--primary);border-radius:14px;padding:1rem;margin-bottom:1rem;}
.sholat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.sholat-item{text-align:center;background:rgba(255,255,255,0.1);border-radius:8px;padding:6px 2px;}
.sholat-item.aktif{background:rgba(201,168,76,0.3);border:1px solid rgba(201,168,76,0.5);}
.sholat-name{font-size:10px;color:rgba(255,255,255,0.8);}
.sholat-time{font-size:13px;font-weight:600;color:white;}

.main{padding:0 1rem 2rem;margin-top:-1.5rem;position:relative;z-index:1;}

/* GALERI FIX HP */
.foto-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.75rem;}
.foto-item{border-radius:10px;overflow:hidden;background:var(--bg);position:relative;height:160px;min-height:160px;}
.foto-item img{width:100%;height:100%;object-fit:cover;display:block;}
.foto-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));color:white;font-size:10px;padding:15px 6px 6px;z-index:2;}
.video-item{border-radius:12px;overflow:hidden;background:black;margin-bottom:10px;height:200px;min-height:200px;}
.video-item iframe{width:100%;height:100%;border:none;display:block;}

/* REKENING */
.rek-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 0;border-bottom:1px solid var(--border);}
.rek-item:last-child{border-bottom:none;}
.btn-salin{background:var(--primary-light);color:var(--primary);border:none;font-size:11px;padding:4px 10px;border-radius:6px;font-weight:600;}

/* AMAL */
.progress-wrap{background:var(--border);height:8px;border-radius:10px;overflow:hidden;margin:10px 0;}
.progress-bar{background:var(--primary);height:100%;border-radius:10px;}
.cta-group{display:flex;gap:8px;margin-top:12px;}
.btn-cta{flex:1;text-align:center;padding:10px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-cta-primary{background:var(--primary);color:white;}
.btn-cta-outline{background:white;color:var(--primary);border:1px solid var(--primary);}

/* FOOTER */
.footer{text-align:center;padding:1.5rem 1rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);background:var(--white);margin-top:1rem;}
.footer a{color:var(--primary);text-decoration:none;font-weight:600;}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-logo">م</div>
  <div class="splash-text">Memuat data masjid...</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<div class="header">
  <div class="logo-wrap" id="logo-wrap"><span class="logo-placeholder">م</span></div>
  <h1 id="nama-masjid">Memuat...</h1>
  <p class="alamat" id="alamat-masjid"></p>
  <p class="deskripsi" id="deskripsi-masjid" style="display:none"></p>
  <div class="badge-pow">✦ Power of Masjid</div>
</div>

<div class="main">
  <!-- JADWAL SHOLAT -->
  <div class="sholat-card" id="sholat-card" style="display:none">
    <div id="sholat-date" style="color:white; font-size:11px; margin-bottom:8px; text-align:center;"></div>
    <div class="sholat-grid" id="sholat-grid"></div>
  </div>

  <div id="list-pengumuman"></div>
  <div id="list-program-amal"></div>

  <!-- REKENING -->
  <div class="section">
    <div class="section-head" style="display:flex; align-items:center; gap:8px; margin-bottom:10px;"><div style="width:8px;height:8px;background:var(--accent);border-radius:50%;"></div><h2 style="font-size:13px; color:var(--muted); text-transform:uppercase;">Infaq & Shadaqah</h2></div>
    <div class="card" style="background:white; border-radius:14px; border:1px solid var(--border); padding:1rem;">
      <div id="qris-box" style="display:none; text-align:center; margin-bottom:15px; background:var(--accent-light); padding:1rem; border-radius:10px;">
        <img id="qris-img" style="width:180px; height:180px; object-fit:contain; background:white; padding:5px; border-radius:8px;" src="">
        <p style="font-size:12px; color:var(--primary); font-weight:600; margin-top:10px;">Scan QRIS Masjid</p>
      </div>
      <div id="list-rekening"></div>
    </div>
  </div>

  <!-- SALDO -->
  <div class="card" style="background:white; border-radius:16px; padding:1.5rem; border:1px solid var(--border); margin:1rem 0; text-align:center;">
    <div style="font-size:12px; color:var(--muted);">Saldo Kas Masjid</div>
    <div id="saldo-total" style="font-family:'Amiri',serif; font-size:32px; color:var(--primary); font-weight:700; margin:5px 0;">Rp 0</div>
    <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:10px; border-top:1px solid var(--border); padding-top:10px;">
      <div style="color:var(--masuk);">Masuk: <span id="total-masuk">0</span></div>
      <div style="color:var(--keluar);">Keluar: <span id="total-keluar">0</span></div>
    </div>
  </div>

  <!-- TRANSAKSI -->
  <div class="section">
    <div class="section-head" style="display:flex; align-items:center; gap:8px; margin-bottom:10px;"><div style="width:8px;height:8px;background:var(--accent);border-radius:50%;"></div><h2 style="font-size:13px; color:var(--muted); text-transform:uppercase;">Transaksi Terakhir</h2></div>
    <div class="card" id="list-transaksi" style="background:white; border-radius:14px; border:1px solid var(--border);"></div>
  </div>

  <!-- JADWAL KEGIATAN -->
  <div class="section">
    <div class="section-head" style="display:flex; align-items:center; gap:8px; margin-bottom:10px;"><div style="width:8px;height:8px;background:var(--accent);border-radius:50%;"></div><h2 style="font-size:13px; color:var(--muted); text-transform:uppercase;">Jadwal Kegiatan</h2></div>
    <div class="card" id="list-jadwal" style="background:white; border-radius:14px; border:1px solid var(--border);"></div>
  </div>

  <!-- GALERI -->
  <div class="section" id="section-galeri" style="display:none">
    <div class="section-head" style="display:flex; align-items:center; gap:8px; margin-bottom:10px;"><div style="width:8px;height:8px;background:var(--accent);border-radius:50%;"></div><h2 style="font-size:13px; color:var(--muted); text-transform:uppercase;">Dokumentasi</h2></div>
    <div class="card" style="background:white; border-radius:14px; border:1px solid var(--border); padding:1rem;">
      <div class="foto-grid" id="foto-grid"></div>
      <div id="video-wrap"></div>
    </div>
  </div>
</div>

<div class="footer">
  Sistem ini dipersembahkan oleh<br>
  <a href="https://powerofmasjid.github.io" target="_blank">Power of Masjid</a> — Yayasan Nasi Jum'at<br>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbybLit4uWhWGsIUZZwiuQ0R5m9VTy87wNN2mD4OnUIC1R4gc0OiPtu22f984W-wxTBcYQ/exec';
var ID_MASJID = '';
var CACHE_DURATION = 60000;

function rupiah(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function formatTgl(t) { var d = new Date(t); return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}); }

async function apiFetch(action, params) {
  var url = API_URL + '?action=' + action;
  if (params) { Object.keys(params).forEach(k => { url += '&' + k + '=' + params[k]; }); }
  var res = await fetch(url); return await res.json();
}

async function loadMasjid(slug) {
  var json = await apiFetch('getMasjidBySlug', {slug: slug});
  var d = json.data; ID_MASJID = d.id_masjid; window.WA_MASJID = d.telepon_wa || '';
  document.getElementById('nama-masjid').textContent = d.nama;
  document.getElementById('alamat-masjid').textContent = d.alamat + ', ' + d.kota;
  if (d.logo_url) document.getElementById('logo-wrap').innerHTML = '<img src="' + d.logo_url + '">';
  if (d.tema) document.body.classList.add('tema-' + d.tema);
  
  // FIX REKENING MUNCUL SEMUA
  var reks = [];
  if (d.rek1_bank && d.rek1_nomor) reks.push({bank: d.rek1_bank, nomor: d.rek1_nomor});
  if (d.rek2_bank && d.rek2_nomor) reks.push({bank: d.rek2_bank, nomor: d.rek2_nomor});
  if (d.rek3_bank && d.rek3_nomor) reks.push({bank: d.rek3_bank, nomor: d.rek3_nomor});
  document.getElementById('list-rekening').innerHTML = reks.map(r => `<div class="rek-item"><div><div style="font-size:13px; font-weight:600;">${r.bank}</div><div style="font-size:14px; margin-top:2px;">${r.nomor}</div></div><button class="btn-salin" onclick="navigator.clipboard.writeText('${r.nomor}')">Salin</button></div>`).join('');
  
  if (d.qris_url) { document.getElementById('qris-box').style.display = 'block'; document.getElementById('qris-img').src = d.qris_url; }
  loadJadwalSholat(d.latitude, d.longitude);
}

async function loadProgramAmal() {
  var json = await apiFetch('getProgramAmal', {id_masjid: ID_MASJID});
  var html = '';
  for (var p of json.data) {
    html += `<div class="section"><div class="section-head" style="display:flex; align-items:center; gap:8px; margin-bottom:10px;"><div style="width:8px;height:8px;background:var(--accent);border-radius:50%;"></div><h2 style="font-size:13px; color:var(--muted); text-transform:uppercase;">${p.judul}</h2></div><div class="card" style="background:white; border-radius:14px; border:1px solid var(--border); padding:1rem;"><div id="amal-content-${p.id}">Memuat...</div></div></div>`;
    fetchDataAmal(p);
  }
  document.getElementById('list-program-amal').innerHTML = html;
}

async function fetchDataAmal(p) {
  var act = p.tipe==='KURBAN'?'getKurban':(p.tipe==='ZAKAT'?'getZakat':'getInfaq');
  var res = await apiFetch(act, {id_masjid:ID_MASJID, id_program:p.id});
  var el = document.getElementById('amal-content-'+p.id);
  var curUrl = window.location.href;
  
  // CAPTION/DESKRIPSI DIAKTIFKAN DI SINI
  var desc = p.deskripsi ? `<div style="font-size:12px; color:var(--muted); margin-bottom:12px;">${p.deskripsi}</div>` : '';
  
  var content = desc;
  if(p.tipe === 'KURBAN') {
      content += `<div style="font-size:12px;">Pendaftar: ${res.data.length} Orang</div>`;
      var shText = encodeURIComponent("Mari ikut program Kurban " + p.judul + " di: " + curUrl);
      content += `<div class="cta-group"><a href="https://wa.me/${window.WA_MASJID}" class="btn-cta btn-cta-primary">Ikut Kurban</a><a href="https://wa.me/?text=${shText}" class="btn-cta btn-cta-outline">Bagikan</a></div>`;
  } else if(p.tipe === 'ZAKAT') {
      var tJiwa = 0; res.data.forEach(d => tJiwa += Number(d.jumlah_jiwa));
      content += `<div style="background:var(--primary-light); padding:10px; border-radius:8px; text-align:center; font-weight:600; color:var(--primary);">${tJiwa} Jiwa Terdaftar</div>`;
      var shTextZ = encodeURIComponent("Tunaikan Zakat Fitrah " + p.judul + " di: " + curUrl);
      content += `<div class="cta-group"><a href="https://wa.me/${window.WA_MASJID}" class="btn-cta btn-cta-primary">Tunaikan Zakat</a><a href="https://wa.me/?text=${shTextZ}" class="btn-cta btn-cta-outline">Bagikan</a></div>`;
  } else if(p.tipe === 'INFAQ') {
      var tU = 0; res.data.forEach(d => tU += Number(d.nominal));
      var target = Number(p.harga_target) || 0;
      var prog = target > 0 ? Math.min(Math.round((tU/target)*100), 100) : 0;
      content += `<div style="text-align:center;"><div style="font-size:24px; font-weight:700; color:var(--primary);">${rupiah(tU)}</div>`;
      if(target > 0) content += `<div class="progress-wrap"><div class="progress-bar" style="width:${prog}%"></div></div><div style="font-size:10px;">${prog}% dari target ${rupiah(target)}</div>`;
      content += `</div><div style="font-size:12px; font-weight:600; margin:10px 0 5px;">Munfiq Berpartisipasi:</div>`;
      res.data.slice(0,5).forEach(d => { content += `<div style="display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:1px solid #eee;"><span>${d.nama}</span><b>${Number(d.nominal)>0?rupiah(d.nominal):'Barang'}</b></div>`; });
      var shTextI = encodeURIComponent("Bantu program Infaq " + p.judul + " di: " + curUrl);
      content += `<div class="cta-group"><a href="https://wa.me/${window.WA_MASJID}" class="btn-cta btn-cta-primary">Infaq Sekarang</a><a href="https://wa.me/?text=${shTextI}" class="btn-cta btn-cta-outline">Bagikan</a></div>`;
  }
  el.innerHTML = content;
}

async function loadSaldo() {
  var j = await apiFetch('getSaldo', {id_masjid: ID_MASJID});
  document.getElementById('saldo-total').textContent = rupiah(j.data.saldo);
  document.getElementById('total-masuk').textContent = rupiah(j.data.masuk_bulan_ini);
  document.getElementById('total-keluar').textContent = rupiah(j.data.keluar_bulan_ini);
}

async function loadTransaksi() {
  var j = await apiFetch('getTransaksi', {id_masjid: ID_MASJID});
  document.getElementById('list-transaksi').innerHTML = j.data.slice(0,5).map(t => `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #f0f0f0;"><div><div style="font-size:13px; font-weight:500;">${t.keterangan}</div><div style="font-size:10px; color:#999;">${formatTgl(t.tanggal)}</div></div><div style="font-size:13px; font-weight:600; color:${t.jenis==='masuk'?'var(--masuk)':'var(--keluar)'}">${t.jenis==='masuk'?'+':'-'} ${rupiah(t.jumlah)}</div></div>`).join('');
}

async function loadJadwal() {
  var j = await apiFetch('getJadwal', {id_masjid: ID_MASJID});
  document.getElementById('list-jadwal').innerHTML = j.data.map(i => `<div style="padding:12px; border-bottom:1px solid #f0f0f0;"><div style="font-size:13px; font-weight:600;">${i.nama_kegiatan}</div><div style="font-size:12px; color:#666; margin-top:2px;">${i.jadwal}</div></div>`).join('');
}

async function loadGaleri() {
  var j = await apiFetch('getGaleri', {id_masjid: ID_MASJID});
  if(j.data.length === 0) return;
  document.getElementById('section-galeri').style.display = 'block';
  var fH = '', vH = '';
  j.data.filter(g => g.tipe==='FOTO').slice(0,4).forEach(f => { fH += `<div class="foto-item"><img src="${f.url}"><div class="foto-caption">${f.judul}</div></div>`; });
  j.data.filter(g => g.tipe==='VIDEO_YOUTUBE').slice(0,2).forEach(v => {
    var ytId = v.url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?]+)/)[1];
    vH += `<div class="video-item"><iframe src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe></div>`;
  });
  document.getElementById('foto-grid').innerHTML = fH;
  document.getElementById('video-wrap').innerHTML = vH;
}

// FIX JADWAL SHOLAT MUNCUL KEMBALI
async function loadJadwalSholat(lat, lon) {
  if(!lat || !lon) return;
  try {
    var url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`;
    var res = await fetch(url); var j = await res.json();
    var t = j.data.timings;
    var list = [ {n:'Subuh', v:t.Fajr}, {n:'Dzuhur', v:t.Dhuhr}, {n:'Ashar', v:t.Asr}, {n:'Maghrib', v:t.Maghrib}, {n:'Isya', v:t.Isha} ];
    document.getElementById('sholat-card').style.display = 'block';
    document.getElementById('sholat-date').textContent = new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
    document.getElementById('sholat-grid').innerHTML = list.map(s => `<div class="sholat-item"><div class="sholat-name">${s.n}</div><div class="sholat-time">${s.v}</div></div>`).join('');
  } catch(e) { console.log(e); }
}

async function init() {
  await loadMasjid(new URLSearchParams(window.location.search).get('masjid') || 'annuriyah-tanjungbarat');
  document.getElementById('splash').classList.add('hide');
  await Promise.all([loadSaldo(), loadTransaksi(), loadProgramAmal(), loadJadwal(), loadGaleri()]);
}
init();
</script>
</body>
</html>
