<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power of Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#1B6B3A;--primary-dark:#0F4228;--primary-light:#E8F5EE;--accent:#C9A84C;--accent-light:#FBF3E0;--bg:#F7F7F5;--white:#FFFFFF;--text:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--masuk:#1B6B3A;--keluar:#DC2626;--new-badge:#22C55E;}
.tema-safir{--primary:#1B3A6B;--primary-dark:#0F2240;--primary-light:#E8EEF5;--accent:#4C7AC9;}
.tema-emas{--primary:#7A5C1B;--primary-dark:#4A3810;--primary-light:#F5EFE8;--accent:#C9A84C;}
.tema-fajar{--primary:#B45309;--primary-dark:#7C3D00;--primary-light:#FEF3E8;--accent:#F59E0B;}
.tema-langit{--primary:#0369A1;--primary-dark:#014F86;--primary-light:#E8F4FB;--accent:#38BDF8;}
.tema-tembaga{--primary:#7C2D12;--primary-dark:#4E1A0A;--primary-light:#FEE8E8;--accent:#C2410C;}
.tema-perak{--primary:#374151;--primary-dark:#1F2937;--primary-light:#F3F4F6;--accent:#9CA3AF;}
.tema-merahhati{--primary:#881337;--primary-dark:#4C0519;--primary-light:#FFF1F2;--accent:#E11D48;}
.tema-toska{--primary:#0F766E;--primary-dark:#094A46;--primary-light:#E8FAF8;--accent:#14B8A6;}
.tema-malam{--primary:#1E3A5F;--primary-dark:#0F1F35;--primary-light:#E8EEF5;--accent:#3B82F6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);}
.splash{position:fixed;inset:0;background:var(--primary-dark);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;}.splash.hide{opacity:0;pointer-events:none;}.splash-text{color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:2rem;}.splash-bar{width:120px;height:3px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden;}.splash-fill{height:100%;background:var(--accent);border-radius:3px;animation:load 1.5s ease forwards;}@keyframes load{from{width:0}to{width:100%}}
.header{background:linear-gradient(160deg,var(--primary-dark) 0%,var(--primary) 100%);padding:2rem 1.25rem 3.5rem;text-align:center;position:relative;overflow:hidden;}.logo-wrap{width:80px;height:80px;border-radius:50%;border:2px solid rgba(201,168,76,0.5);margin:0 auto 1rem;overflow:hidden;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}.header h1{font-family:'Amiri',serif;font-size:22px;color:white;font-weight:700;line-height:1.3;position:relative;z-index:1;}.header .alamat{font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px;position:relative;z-index:1;}.badge-pow{display:inline-flex;align-items:center;gap:4px;background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.4);color:var(--accent);font-size:11px;padding:4px 10px;border-radius:20px;margin-top:10px;font-weight:500;position:relative;z-index:1;}
.sholat-card{background:var(--primary);border-radius:14px;padding:1rem;margin-bottom:1rem;}.sholat-title{font-size:11px;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.75rem;text-align:center;}.sholat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}.sholat-item{text-align:center;background:rgba(255,255,255,0.1);border-radius:8px;padding:6px 2px;}.sholat-item.aktif{background:rgba(201,168,76,0.3);border:1px solid rgba(201,168,76,0.5);}.sholat-name{font-size:10px;color:rgba(255,255,255,0.8);}.sholat-time{font-size:13px;font-weight:600;color:white;margin-top:2px;}
.main{padding:0 1rem 2rem;margin-top:-1.5rem;position:relative;z-index:1;}
.scroll-limit-5 { max-height: 285px; overflow-y: auto; padding-right: 4px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }.scroll-limit-5::-webkit-scrollbar { width: 4px; }.scroll-limit-5::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
.saldo-card{background:var(--white);border-radius:16px;padding:1.5rem;box-shadow:0 4px 24px rgba(0,0,0,0.06);border:1px solid var(--border);margin-bottom:1rem;text-align:center;}.saldo-amount{font-family:'Amiri',serif;font-size:34px;color:var(--primary);font-weight:700;margin:6px 0 4px;}.saldo-stats{display:grid;grid-template-columns:1fr 1fr;}.saldo-stat:first-child{border-right:1px solid var(--border);}.s-val{font-size:15px;font-weight:600;margin-top:2px;}.s-val.masuk{color:var(--masuk);}.s-val.keluar{color:var(--keluar);}
.section{margin-bottom:1rem;}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}.section-head-left{display:flex;align-items:center;gap:8px;}.section-head .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}.section-head h2{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}.card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.trx-item, .jadwal-item{display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1rem;border-bottom:1px solid var(--border);gap:12px;}.trx-item:last-child, .jadwal-item:last-child{border-bottom:none;}.trx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}.trx-icon.masuk{background:var(--primary-light);color:var(--primary);}.trx-icon.keluar{background:#FEF2F2;color:var(--keluar);}.trx-info{flex:1;}.trx-name, .jadwal-title{font-size:14px;font-weight:500;}.trx-date, .jadwal-detail{font-size:11px;color:var(--muted);margin-top:2px;}.trx-amount{font-size:14px;font-weight:600;}
.swipe-wrap { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 5px; margin: 0 -1rem; padding-left: 1rem; padding-right: 1rem; scrollbar-width: none; }.swipe-wrap::-webkit-scrollbar { display: none; }.swipe-card { flex: 0 0 88%; scroll-snap-align: center; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; }.scroll-kurban { height: 160px; overflow-y: auto; padding-right: 5px; scrollbar-width: none; }.scroll-kurban::-webkit-scrollbar { display: none; }.progress-wrap{background:var(--border);height:8px;border-radius:10px;overflow:hidden;margin:10px 0;}.progress-bar{background:var(--primary);height:100%;border-radius:10px;transition:width 1s ease-in-out;}.urgency-label{font-size:10px;color:var(--accent);font-weight:700;background:rgba(201,168,76,0.1);padding:3px 8px;border-radius:12px;display:inline-block;margin-bottom:8px;}
.badge-baru { font-size: 8px; font-weight: 800; background: var(--new-badge); color: white; padding: 2px 6px; border-radius: 4px; margin-left: 6px; text-transform: uppercase; vertical-align: middle; box-shadow: 0 2px 4px rgba(34,197,94,0.3); border: 1px solid rgba(255,255,255,0.2); }
.foto-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.75rem;}.foto-item{border-radius:10px;overflow:hidden;height:160px;background:var(--bg);position:relative;cursor:pointer;}.foto-item img{width:100%;height:100%;object-fit:cover;display:block;}
.cta-group{display:flex;gap:8px;margin-top:12px;}.btn-cta{flex:1;text-align:center;padding:10px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}.btn-cta-primary{background:var(--primary);color:white;}.btn-cta-outline{background:white;color:var(--primary);border:1px solid var(--primary);}
.footer{text-align:center;padding:2rem 1rem;font-size:11px;color:var(--muted);background:var(--white);margin-top:1rem;line-height:1.6;}
.jumat-floater { position: fixed; bottom: 85px; right: 15px; background: linear-gradient(135deg, var(--masuk), var(--primary-dark)); color: white; padding: 12px 16px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 990; display: none; align-items: center; gap: 12px; max-width: 280px; transform: translateY(50px); opacity: 0; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.2); }.jumat-floater.show { display: flex; transform: translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="splash" id="splash">
  <img src="Logo%20Power%20of%20Masjid.png" style="width:120px; height:120px; margin-bottom:15px;">
  <div class="splash-text">Memuat sistem masjid...</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>
<div class="jumat-floater" id="jumat-floater"><div class="jf-icon">🕌</div><div class="jf-text"><div style="font-size:9px; font-weight:700; color:var(--accent); text-transform:uppercase;">PENGINGAT JUM'AT</div><div id="jf-khatib" style="font-size:12px; font-weight:600;">Memuat...</div></div></div>
<div class="header">
  <div class="logo-wrap" id="logo-wrap"></div>
  <h1 id="nama-masjid">Memuat...</h1>
  <p class="alamat" id="alamat-masjid"></p>
  <div class="badge-pow">✦ Power of Masjid</div><br>
  <a class="btn-wa-header" id="btn-wa-header" style="display:none; color:white; font-size:12px; text-decoration:none; padding:8px 15px; border-radius:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);" href="#" target="_blank">Hubungi DKM</a>
</div>
<div class="main">
  <div class="sholat-card" id="sholat-card" style="display:none"><div class="sholat-title" id="sholat-date"></div><div class="sholat-grid" id="sholat-grid"></div></div>
  <div id="list-program-amal"></div>
  <div class="section"><div class="section-head"><div class="section-head-left"><div class="dot"></div><h2>Rekening Infaq</h2></div></div><div class="card" style="padding:15px;" id="list-rekening"></div></div>
  <div class="saldo-card"><div style="font-size:11px; color:var(--muted); text-transform:uppercase;">Saldo Kas Masjid</div><div class="saldo-amount" id="saldo-total">Rp 0</div><div class="saldo-stats"><div class="saldo-stat"><div style="font-size:10px; color:var(--muted);">Masuk (Bulan Ini)</div><div class="s-val masuk" id="total-masuk">Rp 0</div></div><div class="saldo-stat"><div style="font-size:10px; color:var(--muted);">Keluar (Bulan Ini)</div><div class="s-val keluar" id="total-keluar">Rp 0</div></div></div></div>
  <div class="section"><div class="section-head"><div class="section-head-left"><div class="dot"></div><h2>Transaksi Terakhir</h2></div></div><div class="card" id="list-transaksi"></div></div>
  <div class="section"><div class="section-head"><div class="section-head-left"><div class="dot"></div><h2>Jadwal Rutin</h2></div></div><div class="card scroll-limit-5" id="list-jadwal"></div></div>
  <div class="section" id="section-galeri" style="display:none"><div class="section-head"><div class="section-head-left"><div class="dot"></div><h2>Dokumentasi</h2></div></div><div class="card" style="padding:10px;"><div class="foto-grid" id="foto-grid"></div></div></div>
</div>
<div class="footer">Sistem dipersembahkan oleh<br><b>Power of Masjid</b> — Yayasan Nasi Jum'at</div>
<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbw6n1n688x2gHrvYku-AAfPWLtPpE5GOFRrEOvFNvtNph6BgvCkgVQxaFNEUSaIiEDK2g/exec';
var ID_MASJID = '';
function cekDataBaru(idItem){try{if(!idItem)return false; var p=idItem.split('-');if(p.length<2)return false; var t=parseInt(p[p.length-2],36);if(isNaN(t))return false; return (Date.now()-t)/3600000<=12;}catch(e){return false;}}
function rupiah(n){return 'Rp '+Number(n).toLocaleString('id-ID');}
function getSlug(){return new URLSearchParams(window.location.search).get('masjid')||'annuriyah-tanjungbarat';}
async function apiFetch(a,p){var u=API_URL+'?action='+a; if(p)Object.keys(p).forEach(k=>u+='&'+k+'='+p[k]); var r=await fetch(u); return await r.json();}
async function init(){var s=getSlug(); var j=await apiFetch('getMasjidBySlug',{slug:s}); if(j.status!=='ok'){document.getElementById('splash').style.display='none'; return;} var d=j.data; ID_MASJID=d.id_masjid; window.WA_MASJID=d.telepon_wa||''; document.getElementById('nama-masjid').textContent=d.nama; document.getElementById('alamat-masjid').textContent=d.alamat+(d.kota?', '+d.kota:''); if(d.logo_url)document.getElementById('logo-wrap').innerHTML='<img src="'+d.logo_url.replace('open?id=','uc?export=view&id=')+'">'; if(d.tema)document.body.classList.add('tema-'+d.tema); if(d.telepon_wa){var b=document.getElementById('btn-wa-header'); b.href='https://wa.me/'+d.telepon_wa; b.style.display='inline-block';} var rks=[]; if(d.rek1_bank)rks.push(d.rek1_bank+': '+d.rek1_nomor); if(d.rek2_bank)rks.push(d.rek2_bank+': '+d.rek2_nomor); document.getElementById('list-rekening').innerHTML=rks.length?rks.map(r=>'<div style="font-size:13px; margin-bottom:5px; padding:10px; background:var(--primary-light); border-radius:8px; color:var(--primary); font-weight:600;">'+r+'</div>').join(''):'Belum ada rekening'; await Promise.all([loadSaldo(),loadTransaksi(),loadProgramAmal(),loadJadwal(),loadGaleri()]); document.getElementById('splash').style.display='none';}
async function loadSaldo(){var j=await apiFetch('getSaldo',{id_masjid:ID_MASJID}); if(j.status==='ok'){document.getElementById('saldo-total').textContent=rupiah(j.data.saldo); document.getElementById('total-masuk').textContent=rupiah(j.data.masuk_bulan_ini); document.getElementById('total-keluar').textContent=rupiah(j.data.keluar_bulan_ini);}}
async function loadTransaksi(){var j=await apiFetch('getTransaksi',{id_masjid:ID_MASJID}); var el=document.getElementById('list-transaksi'); if(j.data)el.innerHTML=j.data.slice(0,5).map(t=>`<div class="trx-item"><div class="trx-icon ${t.jenis}">${t.jenis==='masuk'?'↑':'↓'}</div><div class="trx-info"><div class="trx-name">${t.keterangan}</div><div class="trx-date">${t.tanggal}</div></div><div class="trx-amount ${t.jenis}">${rupiah(t.jumlah)}</div></div>`).join('');}
async function loadJadwal(){var j=await apiFetch('getJadwal',{id_masjid:ID_MASJID}); var el=document.getElementById('list-jadwal'); if(j.data)el.innerHTML=j.data.map(i=>`<div class="jadwal-item"><div class="jadwal-title">${i.nama_kegiatan}</div><div class="jadwal-detail">${i.jadwal}</div></div>`).join(''); var d=new Date(); if(d.getDay()===4||d.getDay()===5){var jm=j.data.find(k=>k.nama_kegiatan.toLowerCase().includes('jumat')); if(jm){document.getElementById('jf-khatib').textContent=jm.keterangan||jm.nama_kegiatan; document.getElementById('jumat-floater').classList.add('show');}}}
async function loadProgramAmal(){var j=await apiFetch('getProgramAmal',{id_masjid:ID_MASJID}); if(j.data){var h=''; for(var p of j.data){h+=`<div class="section"><div class="section-head"><div class="section-head-left"><div class="dot"></div><h2>${p.judul}</h2></div></div><div class="card" id="amal-box-${p.id}" style="padding:15px;">Memuat...</div></div>`; fetchPartisipan(p);} document.getElementById('list-program-amal').innerHTML=h;}}
async function fetchPartisipan(p){var a=p.tipe==='KURBAN'?'getKurban':(p.tipe==='ZAKAT'?'getZakat':'getInfaq'); var r=await apiFetch(a,{id_masjid:ID_MASJID,id_program:p.id}); var el=document.getElementById('amal-box-'+p.id); var h=`<div style="font-size:12px; color:var(--muted); margin-bottom:12px; line-height:1.5;">${p.deskripsi.split('|||')[0]}</div>`;
if(p.tipe==='KURBAN'){var sk=r.data.filter(x=>x.jenis==='Sapi Kolektif'),sm=r.data.filter(x=>x.jenis==='Sapi Mandiri'),k=r.data.filter(x=>x.jenis.toLowerCase().includes('kambing')); h+=`<div class="swipe-wrap">`; for(var i=0;i<sk.length;i+=7){var c=sk.slice(i,i+7); h+=`<div class="swipe-card"><div style="font-weight:700; font-size:12px; color:var(--primary); margin-bottom:5px;">🐄 Sapi Kolektif #${(i/7)+1}</div><div class="progress-wrap"><div class="progress-bar" style="width:${(c.length/7)*100}%"></div></div><ol style="font-size:12px; padding-left:15px;">${c.map(x=>`<li>${x.nama}${cekDataBaru(x.id)?'<span class="badge-baru">Baru</span>':''}</li>`).join('')}${Array(7-c.length).fill('<li style="color:#ccc; font-style:italic;">[Tersedia]</li>').join('')}</ol></div>`;}
if(sm.length)h+=`<div class="swipe-card"><div style="font-weight:700; font-size:12px; color:var(--primary); margin-bottom:10px;">🐂 Sapi Mandiri</div><div class="scroll-kurban"><ul style="font-size:12px; list-style:none;">${sm.map(x=>`<li style="margin-bottom:5px;">• ${x.nama}${cekDataBaru(x.id)?'<span class="badge-baru">Baru</span>':''}</li>`).join('')}</ul></div></div>`;
if(k.length)h+=`<div class="swipe-card"><div style="font-weight:700; font-size:12px; color:var(--primary); margin-bottom:10px;">🐐 Kambing / Domba</div><div class="scroll-kurban"><ul style="font-size:12px; list-style:none;">${k.map(x=>`<li style="margin-bottom:5px;">• ${x.nama}${cekDataBaru(x.id)?'<span class="badge-baru">Baru</span>':''}</li>`).join('')}</ul></div></div>`; h+=`</div>`;}
else {var t=r.data.reduce((a,b)=>a+(Number(b.nominal)||0),0); if(p.harga_target>0){var pg=Math.min((t/p.harga_target)*100,100); h+=`<div style="background:var(--accent-light); padding:10px; border-radius:10px; margin-bottom:10px; text-align:center;"><div class="urgency-label">Terkumpul ${rupiah(t)} dari ${rupiah(p.harga_target)}</div><div class="progress-wrap"><div class="progress-bar" style="width:${pg}%"></div></div></div>`;}
h+=`<div class="scroll-limit-5">${r.data.map(m=>`<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px;"><span>${m.nama}${cekDataBaru(m.id)?'<span class="badge-baru">Baru</span>':''}</span><span style="font-weight:700; color:var(--primary);">${m.nominal>0?rupiah(m.nominal):(m.catatan||'Partisipasi')}</span></div>`).join('')}</div>`;}
h+=`<div class="cta-group"><a href="https://wa.me/${window.WA_MASJID}" class="btn-cta btn-cta-primary">Ikut Program</a></div>`; el.innerHTML=h;}
async function loadGaleri(){var j=await apiFetch('getGaleri',{id_masjid:ID_MASJID}); if(j.data&&j.data.length){document.getElementById('section-galeri').style.display='block'; document.getElementById('foto-grid').innerHTML=j.data.filter(g=>g.tipe==='FOTO').slice(0,4).map(f=>`<div class="foto-item"><img src="${f.url.replace('open?id=','uc?export=view&id=')}"></div>`).join('');}}
init();
</script>
</body>
</html>
