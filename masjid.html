<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Website Masjid</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* CSS DASAR & MEWAH */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F7F7F5;color:#1A1A1A;line-height:1.6;}
:root{--primary:#1B6B3A;--primary-dark:#0F4228;--accent:#C9A84C;--white:#FFFFFF;--bg:#F7F7F5;--text:#1A1A1A;--muted:#6B7280;}

/* SPLASH SCREEN */
.splash{position:fixed;inset:0;background:var(--primary-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s;}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{font-family:'Amiri',serif;font-size:60px;color:var(--accent);margin-bottom:10px;}

/* HEADER & HERO */
header{background:linear-gradient(160deg,var(--primary-dark),var(--primary));padding:30px 20px;text-align:center;color:white;border-radius:0 0 30px 30px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
.logo-circle{width:80px;height:80px;background:white;border-radius:50%;margin:0 auto 15px;display:flex;align-items:center;justify-content:center;border:3px solid var(--accent);overflow:hidden;}
.logo-circle img{width:100%;height:100%;object-fit:cover;}

/* SECTION PENGUMUMAN (WAH & MEWAH) */
.section-title{padding:20px 20px 10px;font-family:'Amiri',serif;font-size:24px;color:var(--primary);display:flex;justify-content:space-between;align-items:center;}
.container-pengumuman{padding:10px 20px;}
.card-peng{background:white;border-radius:20px;padding:15px;margin-bottom:15px;box-shadow:0 4px 15px rgba(0,0,0,0.04);border-left:5px solid var(--accent);position:relative;}
.card-peng-icon{font-size:24px;margin-bottom:10px;}
.card-peng-tag{position:absolute;top:15px;right:15px;background:var(--primary-light);color:var(--primary);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
.progress-container{margin-top:12px;background:#eee;height:8px;border-radius:10px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg, var(--primary), #2ECC71);border-radius:10px;transition:width 1s;}

/* TOMBOL INFAQ */
.btn-infaq{background:var(--primary);color:white;border:none;padding:12px;width:100%;border-radius:12px;font-weight:700;margin-top:15px;cursor:pointer;font-family:inherit;}

/* LOADING SKELETON (UNTUK DATA YANG MENYUSUL) */
.skeleton{background:#eee;height:100px;border-radius:15px;margin-bottom:10px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{opacity:1;} 50%{opacity:0.5;} 100%{opacity:1;}}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-logo">م</div>
  <div style="color:white; font-size:12px; letter-spacing:2px;">POWER OF MASJID</div>
</div>

<header>
  <div class="logo-circle" id="masjid-logo-container">
    <div style="font-family:'Amiri',serif; font-size:30px; color:var(--primary);">م</div>
  </div>
  <h1 id="masjid-nama" style="font-family:'Amiri',serif; font-size:28px; margin-bottom:5px;">Masjid...</h1>
  <p id="masjid-alamat" style="font-size:12px; opacity:0.8;">Memuat alamat...</p>
</header>

<div id="jadwal-section" style="padding:20px;">
  <div class="skeleton"></div>
</div>

<div class="section-title">Program & Pengumuman</div>
<div id="container-pengumuman" class="container-pengumuman">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<div class="section-title">Laporan Kas Masjid</div>
<div id="container-kas" style="padding:0 20px 50px;">
  <div class="skeleton"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyqxGZb7NzDFPRHTXnpfLo6yqc3LOVwb6DsFOOoZZLXCfLI-iYH0g9CeeSm9puhXcJHXg/exec';

// 1. Ambil SLUG dari URL
const path = window.location.pathname;
const slug = path.split('/').pop() || 'demo';

async function init() {
  // TAHAP 1: Ambil data Profil dulu (Prioritas Kecepatan)
  try {
    const res = await fetch(`${API_URL}?action=getMasjidBySlug&slug=${slug}`);
    const json = await res.json();
    
    if (json.status === 'ok') {
      renderProfil(json.data);
      
      // PERCEIVED PERFORMANCE: Matikan splash segera setelah profil muncul
      document.getElementById('splash').classList.add('hide');
      
      // TAHAP 2: Ambil data lain secara PARALEL (tanpa menunggu satu sama lain)
      loadJadwal(json.data.id_masjid);
      loadPengumuman(json.data.id_masjid);
      loadKas(json.data.id_masjid);
    }
  } catch (e) {
    console.error("Gagal memuat profil");
  }
}

function renderProfil(d) {
  document.getElementById('masjid-nama').textContent = d.nama;
  document.getElementById('masjid-alamat').textContent = d.alamat;
  if (d.logo_url) {
    document.getElementById('masjid-logo-container').innerHTML = `<img src="${d.logo_url}" alt="Logo">`;
  }
}

async function loadPengumuman(id) {
  const res = await fetch(`${API_URL}?action=getPengumuman&id_masjid=${id}`);
  const json = await res.json();
  const container = document.getElementById('container-pengumuman');
  
  if (json.status === 'ok' && json.data.length > 0) {
    container.innerHTML = json.data.map(p => {
      // Logika Progress Bar Mewah
      let progressHtml = '';
      if (p.tipe === 'KURBAN' && p.target_slot > 0) {
        let persen = (p.terisi_slot / p.target_slot) * 100;
        progressHtml = `
          <div style="margin-top:15px;">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
              <span>Slot Sapi Terkumpul</span>
              <strong>${p.terisi_slot} / ${p.target_slot}</strong>
            </div>
            <div class="progress-container"><div class="progress-bar" style="width:${persen}%"></div></div>
          </div>`;
      }

      return `
        <div class="card-peng">
          <div class="card-peng-tag">${p.tipe}</div>
          <div class="card-peng-icon">${p.ikon || '📢'}</div>
          <h3 style="font-size:16px;">${p.judul}</h3>
          <p style="font-size:13px; color:var(--muted); margin-top:5px;">${p.isi}</p>
          ${progressHtml}
          <button class="btn-infaq" onclick="bukaInfaq('${p.id}')">Infaq & Sedekah</button>
        </div>
      `;
    }).join('');
  } else {
    container.innerHTML = '<p style="text-align:center; font-size:12px; color:#999;">Belum ada pengumuman aktif.</p>';
  }
}

// Fungsi load lain (Jadwal & Kas) tetap ada di bawah sini...
// Saya singkat agar Bapak bisa langsung fokus pada logika Init tadi.

window.onload = init;
</script>
</body>
</html>
